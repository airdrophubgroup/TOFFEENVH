<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOFFEENVH - Rewards</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --success: #10b981; --error: #ef4444; --accent: #f59e0b; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #334155; }
        .btn-wallet { background: var(--accent); color: #0f172a; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; }
        .btn-withdraw { background: var(--success); color: white; display: none; margin-top: 15px; width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        #userUI { display: none; margin-top: 20px; }
        .balance-card { background: #0f172a; padding: 20px; border-radius: 15px; border: 1px solid var(--primary); margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: var(--primary);">🍬 TOFFEENVH</h1>
    
    <button id="walletBtn" class="btn-wallet" onclick="connectWallet()">🔑 CONNECT WALLET</button>

    <div id="userUI">
        <div class="balance-card">
            <span id="balText" style="font-size: 22px; font-weight: bold; color: var(--primary);">0 TOFFEE</span>
            <button id="withdrawBtn" class="btn-withdraw" onclick="requestCashOut()">🚀 WITHDRAW 500 (CASH)</button>
        </div>
        <input type="text" id="codeInput" placeholder="ENTER CODE" style="width:80%; padding:12px; border-radius:10px; margin-bottom:10px;">
        <button onclick="processClaim()" style="background:var(--primary); width:100%; padding:15px; border-radius:12px; border:none; font-weight:bold;">CLAIM 10 TOKENS</button>
    </div>
</div>

<script>
    const SB_URL = 'https://xshsfgyfbbnommuhvwat.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzaHNmZ3lmYmJub21tdWh2d2F0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTA4OTYsImV4cCI6MjA4OTU2Njg5Nn0.bv_tP_jH74wzDz99tFBYlcaaZRPqmIkXnYvI_aUbKpo';
    const db = supabase.createClient(SB_URL, SB_KEY);
    let userWallet = "";

    async function connectWallet() {
        // --- MOBILE FIX: Agar Chrome mein hai toh MetaMask App kholo ---
        if (window.ethereum) {
            try {
                const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userWallet = accs[0].toLowerCase();
                document.getElementById("walletBtn").innerText = "CONNECTED";
                document.getElementById("userUI").style.display = "block";
                loadBalance();
            } catch (e) { alert("Please allow connection!"); }
        } else {
            // DEEP LINK: Ye user ko MetaMask App ke andar website par bhej dega
            alert("Opening in MetaMask App...");
            window.location.href = "https://metamask.app.link/dapp/toffeenvh.vercel.app/";
        }
    }

    async function loadBalance() {
        const { data } = await db.from('user_balances').select('pending_balance').eq('wallet_address', userWallet).maybeSingle();
        const bal = data ? data.pending_balance : 0;
        document.getElementById("balText").innerText = bal + " TOFFEE";
        
        // Button Logic: Agar 500+ hai toh dikhao
        if (bal >= 500) {
            document.getElementById("withdrawBtn").style.display = "block";
        }
    }

    async function requestCashOut() {
        const { error } = await db.from('withdrawals').insert([{ 
            wallet_address: userWallet, 
            amount: 500, 
            status: 'pending',
            product_name: 'CASH WITHDRAWAL' 
        }]);
        if (!error) alert("🚀 Request Sent!");
    }
</script>
</body>
</html>
