<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOFFEENVH - Official Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --success: #10b981; --error: #ef4444; --accent: #f59e0b; --gold: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 15px; margin: 0; }
        .container { max-width: 480px; margin: 10px auto; background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid #334155; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .balance-card { background: #0f172a; padding: 15px; border-radius: 18px; margin: 10px 0; border: 1px solid var(--primary); }
        
        /* Store Styles */
        .store-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; text-align: left; }
        .product-card { background: #0f172a; border: 1px solid #334155; border-radius: 15px; padding: 12px; transition: 0.3s; position: relative; overflow: hidden; }
        .product-card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .product-img { width: 100%; height: 80px; background: #1e293b; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin-bottom: 8px; }
        .product-name { font-size: 14px; font-weight: bold; color: var(--text); display: block; }
        .product-price { font-size: 12px; color: var(--accent); font-weight: bold; }
        .btn-redeem { width: 100%; padding: 8px; background: var(--success); color: white; border-radius: 8px; font-size: 12px; margin-top: 8px; border: none; cursor: pointer; }
        .btn-redeem:disabled { background: #334155; cursor: not-allowed; }

        input { width: 85%; padding: 14px; margin: 8px 0; border-radius: 12px; background: #0f172a; color: white; border: 2px solid #334155; font-size: 16px; outline: none; text-transform: uppercase; }
        button { width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        .btn-wallet { background: var(--accent); color: #0f172a; }
        .btn-claim { background: var(--primary); color: #0f172a; }
        
        .section-title { color: var(--gold); font-size: 18px; margin: 25px 0 10px 0; display: flex; align-items: center; justify-content: center; gap: 8px; }
        #wheel { width: 100px; height: 100px; border: 4px solid var(--accent); border-radius: 50%; margin: 10px auto; transition: 4s cubic-bezier(0.1, 0, 0.1, 1); background: conic-gradient(#38bdf8 0deg 72deg, #1e293b 72deg 144deg, #10b981 144deg 216deg, #f59e0b 216deg 288deg, #ef4444 288deg 360deg); }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: var(--primary); margin:0; font-size: 24px;">🍬 TOFFEENVH</h1>
    <p style="font-size: 11px; color: #94a3b8; margin-bottom:15px;">Nihal Vihar Digital Rewards & Store</p>

    <button id="walletBtn" class="btn-wallet" onclick="connectWallet()">CONNECT WALLET</button>

    <div id="userUI" style="display:none;">
        <div class="balance-card">
            <span style="font-size: 12px; color: #94a3b8;">Your Coins</span><br>
            <span id="balText" style="font-size: 24px; font-weight: bold; color: var(--primary);">0 TOFFEE</span>
        </div>

        <input type="text" id="codeInput" placeholder="ENTER WRAPPER CODE">
        <button class="btn-claim" onclick="processClaim()">CLAIM 10 TOKENS</button>

        <div class="section-title">🎁 REDEEM REWARDS</div>
        <p style="font-size: 11px; color: #94a3b8; margin: 0;">Collect coins and get real products at Cafe!</p>
        
        <div class="store-grid">
            <div class="product-card">
                <div class="product-img">🎧</div>
                <span class="product-name">Neckband</span>
                <span class="product-price">1500 TOFFEE</span>
                <button class="btn-redeem" onclick="redeemProduct('Neckband', 1500)">Redeem Now</button>
            </div>
            <div class="product-card">
                <div class="product-img">🧸</div>
                <span class="product-name">Smart Toy</span>
                <span class="product-price">800 TOFFEE</span>
                <button class="btn-redeem" onclick="redeemProduct('Smart Toy', 800)">Redeem Now</button>
            </div>
            <div class="product-card">
                <div class="product-img">🍬</div>
                <span class="product-name">Toffee Jar</span>
                <span class="product-price">300 TOFFEE</span>
                <button class="btn-redeem" onclick="redeemProduct('Toffee Jar', 300)">Redeem Now</button>
            </div>
            <div class="product-card">
                <div class="product-img">🎮</div>
                <span class="product-name">Game Card</span>
                <span class="product-price">500 TOFFEE</span>
                <button class="btn-redeem" onclick="redeemProduct('Game Card', 500)">Redeem Now</button>
            </div>
        </div>

        <div class="section-title">🎡 DAILY LUCK</div>
        <div class="balance-card" style="border-color: var(--accent);">
            <div id="wheel"></div>
            <button class="btn-wallet" style="margin-top:10px; font-size: 12px; padding: 10px;" onclick="handleSpin()">SPIN NOW</button>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://xshsfgyfbbnommuhvwat.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzaHNmZ3lmYmJub21tdWh2d2F0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTA4OTYsImV4cCI6MjA4OTU2Njg5Nn0.bv_tP_jH74wzDz99tFBYlcaaZRPqmIkXnYvI_aUbKpo';
    const db = supabase.createClient(SB_URL, SB_KEY);
    let userWallet = "";
    let currentBalance = 0;

    async function connectWallet() {
        if (window.ethereum) {
            const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userWallet = accs[0].toLowerCase();
            document.getElementById("walletBtn").innerText = "ID: " + userWallet.substring(0,8);
            document.getElementById("userUI").style.display = "block";
            loadBalance();
        }
    }

    async function loadBalance() {
        const { data } = await db.from('user_balances').select('pending_balance').eq('wallet_address', userWallet).maybeSingle();
        currentBalance = data ? data.pending_balance : 0;
        document.getElementById("balText").innerText = currentBalance + " TOFFEE";
    }

    async function processClaim() {
        const code = document.getElementById("codeInput").value.trim().toUpperCase();
        if(!code) return alert("Enter Code!");
        
        const { data: valid } = await db.from('valid_codes').select('*').eq('code', code).eq('is_used', false).maybeSingle();
        if(!valid) return alert("Invalid Code!");

        await db.from('user_balances').upsert({ wallet_address: userWallet, pending_balance: currentBalance + 10, is_withdrawn: false }, { onConflict: 'wallet_address' });
        await db.from('valid_codes').update({ is_used: true }).eq('code', code);
        await db.from('used_codes').insert([{ code: code, user_wallet: userWallet }]);

        alert("10 Tokens Added!");
        loadBalance();
    }

    // --- REDEEM LOGIC ---
    async function redeemProduct(name, price) {
        if(currentBalance < price) return alert("❌ Not enough coins! Aur wrapper scan karein.");
        
        const confirmRedeem = confirm(`Kya aap ${price} TOFFEE ke badle ${name} lena chahte hain?`);
        if(!confirmRedeem) return;

        // 1. Subtract balance
        const { error } = await db.from('user_balances').update({ pending_balance: currentBalance - price }).eq('wallet_address', userWallet);
        
        if(!error) {
            // 2. Log withdrawal request for admin to see
            await db.from('withdrawals').insert([{ 
                wallet_address: userWallet, 
                amount: price, 
                status: 'pending',
                product_name: name // Isse admin ko pata chalega kya dena hai
            }]);

            alert(`✅ Request Sent! Cafe counter par jayein aur apna ${name} lein.`);
            loadBalance();
        }
    }

    async function handleSpin() {
        // ... (Apna purana spin logic yahan rakhein)
        alert("Spin logic processing...");
    }
</script>
</body>
</html>
