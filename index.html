<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOFFEENVH - Official Rewards</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --success: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--primary); margin-bottom: 5px; }
        .balance-card { background: #0f172a; padding: 20px; border-radius: 18px; margin: 20px 0; border: 1px solid var(--primary); }
        .progress-container { background: #334155; border-radius: 10px; height: 18px; width: 100%; margin: 12px 0; overflow: hidden; }
        .progress-bar { background: var(--primary); width: 0%; height: 100%; transition: 0.8s ease; }
        input { width: 90%; padding: 14px; margin: 15px 0; border-radius: 12px; background: #0f172a; color: white; border: 2px solid #334155; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        button { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-wallet { background: #f59e0b; color: #0f172a; }
        .btn-claim { background: var(--primary); color: #0f172a; }
        .btn-withdraw { background: var(--success); color: white; display: none; border: 2px solid #fff; }
        #status { margin-top: 15px; font-size: 14px; padding: 10px; border-radius: 10px; display: none; }
        .msg-success { background: #064e3b; color: #34d399; }
        .msg-error { background: #451a1a; color: #f87171; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍬 TOFFEENVH</h1>
    <p style="color: #94a3b8; font-size: 14px;">Nihal Vihar Cafe Rewards</p>
    
    <button id="walletBtn" class="btn-wallet" onclick="connectWallet()">1. Connect MetaMask</button>

    <div class="balance-card">
        <div style="display: flex; justify-content: space-between; font-size: 14px;">
            <span>Your Balance</span>
            <span id="balText" style="font-weight: bold; color: var(--primary);">0 / 500 TOFFEE</span>
        </div>
        <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>
        <small id="pctText">0% to Withdrawal</small>
    </div>

    <input type="text" id="codeInput" placeholder="Enter Wrapper Code">
    <button id="claimBtn" class="btn-claim" onclick="processClaim()">2. Add 10 Tokens</button>
    
    <button id="withdrawBtn" class="btn-withdraw" onclick="sendWithdrawalRequest()">🚀 REQUEST 500 TOFFEE WITHDRAWAL</button>

    <div id="status"></div>
</div>

<script>
    const SB_URL = 'https://xshsfgyfbbnommuhvwat.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzaHNmZ3lmYmJub21tdWh2d2F0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTA4OTYsImV4cCI6MjA4OTU2Njg5Nn0.bv_tP_jH74wzDz99tFBYlcaaZRPqmIkXnYvI_aUbKpo';
    const db = supabase.createClient(SB_URL, SB_KEY);
    let userWallet = "";

    async function connectWallet() {
        if (window.ethereum) {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userWallet = accounts[0].toLowerCase();
            document.getElementById("walletBtn").innerText = "Wallet: " + userWallet.substring(0,8) + "...";
            loadBalance();
            showStatus("Wallet Connected!", "success");
        } else { alert("MetaMask Install Karein!"); }
    }

    async function loadBalance() {
        if(!userWallet) return;
        const { data } = await db.from('user_balances').select('pending_balance').eq('wallet_address', userWallet).maybeSingle();
        if (data) updateUI(data.pending_balance);
    }

    function updateUI(bal) {
        document.getElementById("balText").innerText = bal + " / 500 TOFFEE";
        let pct = (bal / 500) * 100;
        document.getElementById("progressBar").style.width = Math.min(pct, 100) + "%";
        document.getElementById("pctText").innerText = Math.floor(pct) + "% Completed";
        
        // 500 hone par withdraw button dikhao, par claim button ko rehne do
        if (bal >= 500) {
            document.getElementById("withdrawBtn").style.display = "block";
        }
    }

    async function processClaim() {
        const input = document.getElementById("codeInput");
        const code = input.value.trim().toUpperCase();

        if (!userWallet) return alert("Pehle Wallet Connect karein!");
        if (!code) return alert("Code daalna zaroori hai!");

        showStatus("Verifying code...", "success");

        // 1. Check if code already used by ANYONE
        const { data: isUsed } = await db.from('used_codes').select('*').eq('code', code).maybeSingle();
        if (isUsed) {
            alert("❌ Ye code pehle hi use ho chuka hai!");
            showStatus("Code Already Claimed", "error");
            return;
        }

        // 2. Mark code as used
        const { error: lockError } = await db.from('used_codes').insert([{ code: code, user_wallet: userWallet }]);
        if (lockError) {
            alert("❌ Code Error! Kisi aur ne ye use kar liya hai.");
            return;
        }

        // 3. Update Balance
        const { data: currentData } = await db.from('user_balances').select('pending_balance').eq('wallet_address', userWallet).maybeSingle();
        let oldBal = currentData ? currentData.pending_balance : 0;
        let newBal = oldBal + 10;

        await db.from('user_balances').upsert({ wallet_address: userWallet, pending_balance: newBal });

        alert("✅ 10 Tokens Added! Naya Balance: " + newBal);
        input.value = "";
        updateUI(newBal);
        showStatus("Success!", "success");
    }

    function sendWithdrawalRequest() {
        alert("Withdrawal request sent to Admin! Nihal Vihar cafe team will verify and send tokens.");
    }

    function showStatus(msg, type) {
        const s = document.getElementById("status");
        s.innerText = msg;
        s.className = `msg-${type}`;
        s.style.display = "block";
    }
</script>

</body>
</html>
