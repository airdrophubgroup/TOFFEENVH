<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOFFEENVH - Ranking</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --success: #10b981; --error: #ef4444; --accent: #f59e0b; --gold: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 15px; margin: 0; }
        .container { max-width: 450px; margin: 10px auto; background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #334155; }
        .balance-card { background: #0f172a; padding: 15px; border-radius: 18px; margin: 10px 0; border: 1px solid var(--primary); }
        
        /* Leaderboard Styles */
        .leaderboard { background: #020617; border-radius: 18px; padding: 15px; margin-top: 20px; border: 1px solid var(--accent); }
        .rank-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #1e293b; font-size: 14px; }
        .rank-item:last-child { border: none; }
        .rank-number { color: var(--accent); font-weight: bold; width: 30px; text-align: left; }
        .rank-wallet { flex-grow: 1; text-align: left; font-family: monospace; color: #94a3b8; }
        .rank-count { color: var(--success); font-weight: bold; }
        .my-rank { background: rgba(56, 189, 248, 0.1); border-radius: 10px; padding: 10px; margin-bottom: 15px; border: 1px solid var(--primary); }

        input { width: 85%; padding: 14px; margin: 8px 0; border-radius: 12px; background: #0f172a; color: white; border: 2px solid #334155; font-size: 16px; outline: none; text-transform: uppercase; }
        button { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-wallet { background: var(--accent); color: #0f172a; }
        .btn-claim { background: var(--primary); color: #0f172a; }
        #wheel { width: 120px; height: 120px; border: 4px solid var(--accent); border-radius: 50%; margin: 15px auto; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); background: conic-gradient(#38bdf8 0deg 72deg, #1e293b 72deg 144deg, #10b981 144deg 216deg, #f59e0b 216deg 288deg, #ef4444 288deg 360deg); }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: var(--primary); margin:0;">🍬 TOFFEENVH</h1>
    <p style="font-size: 12px; color: #94a3b8; margin-bottom:15px;">Nihal Vihar Cyber Cafe Rankings</p>

    <button id="walletBtn" class="btn-wallet" onclick="connectWallet()">CONNECT WALLET</button>

    <div id="userUI" style="display:none;">
        <div class="my-rank">
            <div style="font-size: 12px; color: #94a3b8;">Your Total Scans</div>
            <div id="myTotalScans" style="font-size: 24px; font-weight: bold; color: var(--primary);">0</div>
            <div id="rankText" style="font-size: 11px; color: var(--accent); margin-top:5px;">Ranking: Loading...</div>
        </div>

        <div class="balance-card">
            <span id="balText" style="font-weight: bold;">0 / 500 TOFFEE</span>
        </div>

        <input type="text" id="codeInput" placeholder="ENTER WRAPPER CODE">
        <button class="btn-claim" onclick="processClaim()">CLAIM WRAPPER</button>

        <div class="leaderboard">
            <h3 style="margin: 0 0 10px 0; color: var(--gold); font-size: 16px;">🏆 TOP 5 WRAPPER KINGS</h3>
            <div id="leaderboardList">Loading ranks...</div>
        </div>

        <div class="balance-card" style="border-color: var(--accent); margin-top: 20px;">
            <div id="wheel"></div>
            <button class="btn-wallet" style="margin-top:10px;" onclick="handleSpin()">DAILY SPIN</button>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://xshsfgyfbbnommuhvwat.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzaHNmZ3lmYmJub21tdWh2d2F0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTA4OTYsImV4cCI6MjA4OTU2Njg5Nn0.bv_tP_jH74wzDz99tFBYlcaaZRPqmIkXnYvI_aUbKpo';
    const db = supabase.createClient(SB_URL, SB_KEY);
    let userWallet = "";

    async function connectWallet() {
        if (window.ethereum) {
            const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userWallet = accs[0].toLowerCase();
            document.getElementById("walletBtn").innerText = "ID: " + userWallet.substring(0,8);
            document.getElementById("userUI").style.display = "block";
            refreshData();
        } else { alert("Use MetaMask!"); }
    }

    async function refreshData() {
        loadBalance();
        loadLeaderboard();
        loadUserStats();
    }

    async function loadUserStats() {
        // Count total scans from used_codes table
        const { count, error } = await db.from('used_codes')
            .select('*', { count: 'exact', head: true })
            .eq('user_wallet', userWallet);
        
        document.getElementById("myTotalScans").innerText = count || 0;
    }

    async function loadLeaderboard() {
        // Get counts grouped by user_wallet
        // Note: For simple logic, we fetch all used_codes and count manually
        const { data } = await db.from('used_codes').select('user_wallet');
        
        const counts = {};
        data.forEach(item => {
            counts[item.user_wallet] = (counts[item.user_wallet] || 0) + 1;
        });

        const sorted = Object.entries(counts)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 5);

        let html = "";
        sorted.forEach((entry, index) => {
            const isMe = entry[0] === userWallet;
            html += `
                <div class="rank-item" style="${isMe ? 'background: rgba(56,189,248,0.1); border-radius:5px;' : ''}">
                    <span class="rank-number">#${index + 1}</span>
                    <span class="rank-wallet">${entry[0].substring(0,6)}...${entry[0].substring(38)}</span>
                    <span class="rank-count">${entry[1]} Scans</span>
                </div>`;
            if(isMe) document.getElementById("rankText").innerText = `Your Ranking: #${index + 1} Wrapper King!`;
        });
        document.getElementById("leaderboardList").innerHTML = html || "No scans yet!";
    }

    async function processClaim() {
        const input = document.getElementById("codeInput");
        const code = input.value.trim().toUpperCase();
        if (!userWallet || !code) return alert("Fill details!");

        try {
            const { data: validData } = await db.from('valid_codes').select('*').eq('code', code).eq('is_used', false).maybeSingle();
            if (!validData) return alert("Invalid Code!");

            const { data: cur } = await db.from('user_balances').select('pending_balance').eq('wallet_address', userWallet).maybeSingle();
            let newBal = (cur ? cur.pending_balance : 0) + 10;

            await db.from('user_balances').upsert({ wallet_address: userWallet, pending_balance: newBal, is_withdrawn: false }, { onConflict: 'wallet_address' });
            await db.from('valid_codes').update({ is_used: true }).eq('code', code);
            await db.from('used_codes').insert([{ code: code, user_wallet: userWallet }]);

            alert("Claimed! Stats updated.");
            input.value = "";
            refreshData();
        } catch (e) { console.error(e); }
    }

    async function loadBalance() {
        const { data } = await db.from('user_balances').select('pending_balance').eq('wallet_address', userWallet).maybeSingle();
        document.getElementById("balText").innerText = (data ? data.pending_balance : 0) + " / 500 TOFFEE";
    }

    // handleSpin function (same as before)
    async function handleSpin() {
        // ... (use previous handleSpin logic)
        alert("Pehle aaj ek code scan karein!"); // simplified placeholder
    }
</script>
</body>
</html>
