<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOFFEENVH - Nihal Vihar Rewards</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js" type="application/javascript"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #1a1a2e; color: white; padding: 50px; }
        .container { background: #16213e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: inline-block; max-width: 400px; width: 90%; border: 1px solid #0f3460; }
        h1 { color: #e94560; margin-bottom: 5px; }
        p { color: #95a5a6; margin-bottom: 25px; }
        input { padding: 12px; width: 85%; margin: 15px 0; border: none; border-radius: 8px; background: #0f3460; color: white; text-align: center; font-size: 16px; }
        button { padding: 12px 25px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; margin: 10px 5px; transition: 0.3s; font-size: 15px; }
        .connect-btn { background: #f1c40f; color: #1a1a2e; }
        .connect-btn:hover { background: #d4ac0d; }
        .claim-btn { background: #e94560; color: white; width: 95%; }
        .claim-btn:hover { background: #c62842; }
        #status { margin-top: 20px; font-size: 14px; font-weight: bold; }
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🍬 TOFFEENVH</h1>
        <p>Nihal Vihar Digital Rewards</p>
        
        <button id="walletBtn" class="connect-btn" onclick="connectWallet()">1. Connect Wallet</button>
        
        <br>
        
        <input type="text" id="toffeeCodeInput" placeholder="Enter Toffee Code (e.g. TOFFEE-XXXX)">
        
        <br>
        
        <button id="claimBtn" class="claim-btn" onclick="claimTokens()">2. Claim 10 Tokens</button>
        
        <div id="status"></div>
    </div>

    <script>
        // AAPKA LIVE CONTRACT ADDRESS
        const contractAddress = "0xF5Fc412E1aE71924fd7C6bD44A3cDADa8e69fd37"; 

        const abi = [
            { "inputs": [{ "internalType": "string[]", "name": "codes", "type": "string[]" }], "name": "addCodes", "outputs": [], "stateMutability": "nonpayable", "type": "function" },
            { "inputs": [{ "internalType": "string", "name": "code", "type": "string" }], "name": "claimReward", "outputs": [], "stateMutability": "nonpayable", "type": "function" },
            { "inputs": [{ "internalType": "address", "name": "_tokenAddress", "type": "address" }], "stateMutability": "nonpayable", "type": "constructor" },
            { "inputs": [], "name": "owner", "outputs": [{ "internalType": "address", "name": "", "type": "address" }], "stateMutability": "view", "type": "function" },
            { "inputs": [], "name": "rewardAmount", "outputs": [{ "internalType": "uint256", "name": "", "type": "uint256" }], "stateMutability": "view", "type": "function" },
            { "inputs": [], "name": "toffeeToken", "outputs": [{ "internalType": "contract IERC20", "name": "", "type": "address" }], "stateMutability": "view", "type": "function" },
            { "inputs": [{ "internalType": "string", "name": "", "type": "string" }], "name": "usedCodes", "outputs": [{ "internalType": "bool", "name": "", "type": "bool" }], "stateMutability": "view", "type": "function" },
            { "inputs": [{ "internalType": "string", "name": "", "type": "string" }], "name": "validCodes", "outputs": [{ "internalType": "bool", "name": "", "type": "bool" }], "stateMutability": "view", "type": "function" }
        ];

        let provider, signer, contract;

        async function connectWallet() {
            const statusDiv = document.getElementById("status");
            if (window.ethereum) {
                try {
                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    signer = provider.getSigner();
                    contract = new ethers.Contract(contractAddress, abi, signer);
                    const address = await signer.getAddress();
                    document.getElementById("walletBtn").innerText = "Connected: " + address.substring(0, 6) + "...";
                    statusDiv.innerHTML = "<span class='success'>Wallet Connected Successfully!</span>";
                } catch (err) {
                    statusDiv.innerHTML = "<span class='error'>Connection Failed!</span>";
                }
            } else {
                alert("MetaMask install karein ya Crypto browser use karein!");
            }
        }

        async function claimTokens() {
            const code = document.getElementById("toffeeCodeInput").value.trim();
            const statusDiv = document.getElementById("status");

            if (!code) {
                alert("Toffee wrapper ka code enter karein!");
                return;
            }
            if (!contract) {
                alert("Pehle Wallet Connect karein!");
                return;
            }

            try {
                statusDiv.innerHTML = "Processing Transaction... Please Wait";
                const tx = await contract.claimReward(code);
                statusDiv.innerHTML = "Waiting for Blockchain confirmation...";
                await tx.wait();
                statusDiv.innerHTML = "<span class='success'>Mubarak Ho! 10 Tokens bhej diye gaye hain.</span>";
                alert("Success! Check your wallet for TOFFEENVH tokens.");
            } catch (err) {
                console.error(err);
                statusDiv.innerHTML = "<span class='error'>Error: Code galat hai, use ho chuka hai ya gas ki kami hai.</span>";
            }
        }
    </script>
</body>
</html>
