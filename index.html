<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOFFEENVH - Rewards Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --success: #10b981; --error: #ef4444; --accent: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 450px; margin: 20px auto; background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #334155; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        h1 { color: var(--primary); font-size: 26px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .balance-card { background: #0f172a; padding: 18px; border-radius: 18px; margin: 15px 0; border: 1px solid var(--primary); }
        .progress-container { background: #334155; border-radius: 10px; height: 16px; width: 100%; margin: 10px 0; overflow: hidden; }
        .progress-bar { background: var(--primary); width: 0%; height: 100%; transition: 0.5s ease; }
        input { width: 85%; padding: 14px; margin: 8px 0; border-radius: 12px; background: #0f172a; color: white; border: 2px solid #334155; font-size: 16px; outline: none; text-transform: uppercase; }
        input:focus { border-color: var(--primary); }
        button { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-wallet { background: var(--accent); color: #0f172a; }
        .btn-claim { background: var(--primary); color: #0f172a; }
        #status { margin-top: 15px; font-size: 13px; padding: 10px; border-radius: 10px; display: none; background: #1e293b; border: 1px solid #334155; }
        
        /* Spinner Styles */
        #wheel-box { position: relative; margin: 20px auto; width: 150px; height: 150px; }
        #wheel { width: 100%; height: 100%; border: 5px solid var(--accent); border-radius: 50%; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); background: conic-gradient(#38bdf8 0deg 72deg, #1e293b 72deg 144deg, #10b981 144deg 216deg, #f59e0b 216deg 288deg, #ef4444 288deg 360deg); }
        .needle { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 20px solid white; z-index: 10; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍬 TOFFEENVH</h1>
    <p style="color: #94a3b8; font-size: 12px;">Cyber Cafe Nihal Vihar Special</p>

    <button id="walletBtn" class="btn-wallet" onclick="connectWallet()">1. CONNECT WALLET</button>

    <div id="userUI">
        <div class="balance-card">
            <div style="display: flex; justify-content: space-between; font-size: 14px;">
                <span>Total Balance</span>
                <span id="balText" style="font-weight: bold; color: var(--primary);">0 / 500 TOFFEE</span>
            </div>
            <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>
        </div>

        <input type="text" id="codeInput" placeholder="ENTER WRAPPER CODE">
        <button class="btn-claim" id="claimBtn" onclick="processClaim()">2. CLAIM WRAPPER (10 TKN)</button>

        <div class="balance-card" style="border-color: var(--accent); background: rgba(245, 158, 11, 0.05);">
            <h3 style="margin: 0; color: var(--accent); font-size: 18px;">🎡 LUCKY DAILY SPIN</h3>
            <p style="font-size: 11px; color: #94a3b8; margin: 5px 0;">(Must claim a wrapper today to spin!)</p>
            <div id="wheel-box">
                <div class="needle"></div>
                <div id="wheel"></div>
            </div>
            <button id="spinBtn" class="btn-wallet" onclick="handleSpin()">🎰 SPIN & WIN</button>
            <p id="spinTimer" style="font-size: 12px; color: var(--error); display: none; margin-top: 8px; font-weight: bold;"></p>
        </div>
    </div>

    <div id="status"></div>
</div>

<script>
    const SB_URL = 'https://xshsfgyfbbnommuhvwat.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzaHNmZ3lmYmJub21tdWh2d2F0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTA4OTYsImV4cCI6MjA4OTU2Njg5Nn0.bv_tP_jH74wzDz99tFBYlcaaZRPqmIkXnYvI_aUbKpo';
    const db = supabase.createClient(SB_URL, SB_KEY);
    let userWallet = "";

    async function connectWallet() {
        if (window.ethereum) {
            const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userWallet = accs[0].toLowerCase();
            document.getElementById("walletBtn").innerText = "WALLET: " + userWallet.substring(0,8) + "...";
            loadBalance();
        } else { alert("Please use MetaMask Browser!"); }
    }

    async function loadBalance() {
        if(!userWallet) return;
        const { data } = await db.from('user_balances').select('pending_balance').eq('wallet_address', userWallet).maybeSingle();
        const bal = data ? data.pending_balance : 0;
        document.getElementById("balText").innerText = bal + " / 500 TOFFEE";
        document.getElementById("progressBar").style.width = Math.min((bal/500)*100, 100) + "%";
    }

    async function processClaim() {
        const input = document.getElementById("codeInput");
        const code = input.value.trim().toUpperCase();
        if (!userWallet || !code) return alert("Wallet connect karein aur code dalein!");

        showStatus("Checking Code...", "info");

        try {
            // 1. Check valid_codes table
            const { data: validData, error: fetchErr } = await db.from('valid_codes')
                .select('*').eq('code', code).eq('is_used', false).maybeSingle();

            if (fetchErr || !validData) {
                alert("❌ Invalid ya Used Code!");
                return showStatus("Invalid Code", "error");
            }

            // 2. Update Balance
            const { data: cur } = await db.from('user_balances').select('pending_balance').eq('wallet_address', userWallet).maybeSingle();
            let newBal = (cur ? cur.pending_balance : 0) + 10;

            await db.from('user_balances').upsert({ 
                wallet_address: userWallet, 
                pending_balance: newBal,
                is_withdrawn: false 
            }, { onConflict: 'wallet_address' });

            // 3. Mark code as used AND log it in used_codes for spin eligibility
            await db.from('valid_codes').update({ is_used: true }).eq('code', code);
            await db.from('used_codes').insert([{ code: code, user_wallet: userWallet }]);

            alert("✅ Wrapper Claimed! 10 TOFFEE Added. Daily Spin is now UNLOCKED for today!");
            input.value = "";
            loadBalance();
            showStatus("Claim Successful!", "success");
        } catch (e) {
            console.error(e);
            alert("Error claiming code!");
        }
    }

    async function handleSpin() {
        if (!userWallet) return alert("Pehle Wallet connect karein!");
        const btn = document.getElementById("spinBtn");
        const wheel = document.getElementById("wheel");
        const timerText = document.getElementById("spinTimer");

        showStatus("Checking eligibility...", "info");

        try {
            // --- STEP 1: Check if claimed a wrapper TODAY ---
            const startOfDay = new Date();
            startOfDay.setHours(0,0,0,0);
            
            const { data: todayClaims, error: claimErr } = await db
                .from('used_codes')
                .select('created_at')
                .eq('user_wallet', userWallet)
                .gte('created_at', startOfDay.toISOString());

            if (claimErr) throw claimErr;

            if (!todayClaims || todayClaims.length === 0) {
                alert("❌ Spin Lock! Pehle aaj ek wrapper code claim karein.");
                return showStatus("Claim a wrapper first!", "error");
            }

            // --- STEP 2: Check 24h Spin Cooldown ---
            const { data: spinData } = await db.from('daily_spins').select('last_spin_at').eq('wallet_address', userWallet).maybeSingle();
            if (spinData) {
                const diff = (new Date() - new Date(spinData.last_spin_at)) / (1000 * 60 * 60);
                if (diff < 24) {
                    const wait = Math.ceil(24 - diff);
                    alert(`⏳ Wait ${wait} hours for next spin.`);
                    timerText.innerText = `Come back in ${wait}h`;
                    timerText.style.display = "block";
                    return;
                }
            }

            // --- STEP 3: Spin ---
            btn.disabled = true;
            timerText.style.display = "none";
            const deg = Math.floor(Math.random() * 360) + 1800;
            wheel.style.transform = `rotate(${deg}deg)`;

            setTimeout(async () => {
                const win = [5, 10, 20, 50, 5][Math.floor(Math.random() * 5)];
                const { data: b } = await db.from('user_balances').select('pending_balance').eq('wallet_address', userWallet).maybeSingle();
                
                await db.from('user_balances').upsert({ 
                    wallet_address: userWallet, 
                    pending_balance: (b ? b.pending_balance : 0) + win,
                    is_withdrawn: false 
                }, { onConflict: 'wallet_address' });

                await db.from('daily_spins').upsert({ wallet_address: userWallet, last_spin_at: new Date().toISOString() });

                alert(`🎉 Congratulations! You won ${win} TOFFEE!`);
                loadBalance();
                btn.disabled = false;
                showStatus("Spin Won!", "success");
            }, 4000);

        } catch (err) {
            console.error(err);
            alert("Error checking spin eligibility!");
        }
    }

    function showStatus(msg, type) {
        const s = document.getElementById("status");
        s.innerText = msg; s.style.display = "block";
        s.style.color = type === "error" ? "var(--error)" : "var(--primary)";
    }
</script>
</body>
</html>
