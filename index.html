<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOFFEENVH - Rewards</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --success: #10b981; --error: #ef4444; --accent: #f59e0b; --gold: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 15px; margin: 0; }
        .container { max-width: 450px; margin: 10px auto; background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #334155; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .balance-card { background: #0f172a; padding: 18px; border-radius: 18px; margin: 12px 0; border: 1px solid var(--primary); }
        button { width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; margin: 5px 0; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-wallet { background: var(--accent); color: #0f172a; }
        .btn-claim { background: var(--primary); color: #0f172a; }
        .btn-withdraw { background: var(--success); color: white; display: none; margin-top: 10px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; background: #0f172a; color: white; border: 1px solid #334155; box-sizing: border-box; outline: none; }
        
        .rewards-store { background: linear-gradient(145deg, #1e293b, #020617); padding: 20px; border-radius: 20px; margin-top: 25px; border: 1px solid rgba(245, 158, 11, 0.3); }
        .reward-items { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .item-box { background: rgba(15, 23, 42, 0.6); padding: 10px; border-radius: 12px; border: 1px solid #334155; font-size: 12px; }
        .coming-tag { background: var(--accent); color: #000; font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        
        #adminPanel { display: none; margin-top: 30px; padding: 20px; background: #020617; border: 2px dashed var(--error); border-radius: 20px; text-align: left; }
        .req-card { background: #1e293b; padding: 12px; border-radius: 12px; margin-top: 10px; border-left: 4px solid var(--success); }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: var(--primary); margin:0;">🍬 TOFFEENVH</h1>
    <button id="walletBtn" class="btn-wallet" onclick="connectWallet()">🔑 CONNECT WALLET</button>

    <div id="userUI" style="display:none;">
        <div class="balance-card">
            <span id="balText" style="font-size: 24px; font-weight: bold; color: var(--primary);">0 TOFFEE</span>
            <button id="withdrawBtn" class="btn-withdraw" onclick="requestWithdrawal()">🚀 WITHDRAW 500 (CASH)</button>
        </div>

        <input type="text" id="codeInput" placeholder="ENTER WRAPPER CODE">
        <button id="claimBtn" class="btn-claim" onclick="processClaim()">💰 CLAIM 10 TOKENS</button>

        <div class="rewards-store">
            <h3>🎁 REWARDS STORE <span class="coming-tag">COMING SOON</span></h3>
            <div class="reward-items">
                <div class="item-box"><span>🎧</span> Neckbands</div>
                <div class="item-box"><span>🎮</span> Games</div>
            </div>
        </div>
        <button style="background:#334155; color:white; font-size:11px; margin-top:15px; width:auto; padding:8px 15px;" onclick="location.reload()">🔄 SWITCH WALLET</button>
    </div>

    <div id="adminPanel">
        <h3 style="color: #f43f5e; margin: 0 0 10px 0;">👨‍💻 OWNER DASHBOARD</h3>
        <textarea id="newCodesInput" placeholder="C001, C002..." rows="2"></textarea>
        <button id="uploadBtn" onclick="uploadCodes()" style="background:var(--primary); color:white;">UPLOAD CODES</button>
        <hr style="border:0; border-top:1px solid #334155; margin:15px 0;">
        <h4 style="color:var(--success); margin:0;">PENDING WITHDRAWALS:</h4>
        <div id="reqList" style="font-size: 11px;"></div>
    </div>
</div>

<script>
    const SB_URL = 'https://xshsfgyfbbnommuhvwat.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzaHNmZ3lmYmJub21tdWh2d2F0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTA4OTYsImV4cCI6MjA4OTU2Njg5Nn0.bv_tP_jH74wzDz99tFBYlcaaZRPqmIkXnYvI_aUbKpo';
    const db = supabase.createClient(SB_URL, SB_KEY);
    const ADMIN_WALLET = "0x8fb70cdfb545c7d9b842cbe37b9aba84059bf14b";
    
    let userWallet = "";
    let userBalance = 0;

    async function connectWallet() {
        try {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userWallet = accounts[0].toLowerCase();
                document.getElementById("walletBtn").innerText = "ID: " + userWallet.substring(0,10);
                document.getElementById("userUI").style.display = "block";
                
                if (userWallet === ADMIN_WALLET.toLowerCase()) {
                    document.getElementById("adminPanel").style.display = "block";
                    loadAdminRequests();
                }
                refreshData();
            } else {
                window.location.href = "https://metamask.app.link/dapp/toffeenvh.vercel.app/";
            }
        } catch (e) { alert("Wallet Error!"); }
    }

    async function refreshData() {
        if(!userWallet) return;
        try {
            const { data } = await db.from('user_balances').select('pending_balance').eq('wallet_address', userWallet).maybeSingle();
            userBalance = data ? data.pending_balance : 0;
            document.getElementById("balText").innerText = userBalance + " TOFFEE";
            
            const wBtn = document.getElementById("withdrawBtn");
            if(userBalance >= 500) {
                const { data: pending } = await db.from('withdrawals').select('id').eq('wallet_address', userWallet).eq('status', 'pending').maybeSingle();
                wBtn.style.display = "block";
                wBtn.disabled = !!pending;
                wBtn.innerText = pending ? "⏳ REQUEST SENT (PENDING)" : "🚀 WITHDRAW 500 (CASH)";
            } else {
                wBtn.style.display = "none";
            }
        } catch (e) { console.error("Sync Error"); }
    }

    async function processClaim() {
        const btn = document.getElementById("claimBtn");
        const codeInput = document.getElementById("codeInput");
        const code = codeInput.value.trim().toUpperCase();
        if(!code || btn.disabled) return;
        btn.disabled = true;
        btn.innerText = "⌛ CHECKING...";
        try {
            const { data: valid } = await db.from('valid_codes').select('*').eq('code', code).eq('is_used', false).maybeSingle();
            if (!valid) throw new Error("Invalid or Used Code!");

            await db.from('user_balances').upsert({ wallet_address: userWallet, pending_balance: userBalance + 10 }, { onConflict: 'wallet_address' });
            await db.from('valid_codes').update({ is_used: true }).eq('code', code);
            await db.from('used_codes').insert([{ code: code, user_wallet: userWallet }]);

            alert("✅ 10 TOFFEE Added!");
            codeInput.value = "";
            refreshData(); 
        } catch (e) { alert(e.message); }
        btn.disabled = false;
        btn.innerText = "💰 CLAIM 10 TOKENS";
    }

    // Fixed: Withdrawal Request function
    async function requestWithdrawal() {
        if(userBalance < 500) return alert("Min 500 required!");
        const btn = document.getElementById("withdrawBtn");
        btn.disabled = true;
        btn.innerText = "⌛ SUBMITTING...";
        try {
            const { error } = await db.from('withdrawals').insert([{ 
                wallet_address: userWallet, 
                amount: 500, 
                status: 'pending' 
            }]);
            if (error) throw error;
            alert("🚀 Request sent to Owner!");
            refreshData();
        } catch (e) { 
            alert("Error: " + e.message); 
            btn.disabled = false;
        }
    }

    // Owner: Load Requests
    async function loadAdminRequests() {
        try {
            const { data: reqs } = await db.from('withdrawals').select('*').eq('status', 'pending');
            let h = "";
            reqs?.forEach(r => {
                h += `<div class="req-card">
                    <p style="margin:0; word-break:break-all;">User: ${r.wallet_address}</p>
                    <button onclick="approveWithdrawal(${r.id}, '${r.wallet_address}')" style="background:var(--success); color:white; padding:8px; font-size:11px; margin-top:8px;">MARK PAID & DEDUCT 500</button>
                </div>`;
            });
            document.getElementById("reqList").innerHTML = h || "No pending requests.";
        } catch(e) { console.error(e); }
    }

    // Owner: Approve & Deduct
    async function approveWithdrawal(id, address) {
        if(!confirm("Are you sure? User tokens will be deducted.")) return;
        try {
            const { data: user } = await db.from('user_balances').select('pending_balance').eq('wallet_address', address).single();
            if(!user) return alert("User not found!");

            // 1. Deduct 500 from user balance
            await db.from('user_balances').update({ pending_balance: user.pending_balance - 500 }).eq('wallet_address', address);
            // 2. Mark withdrawal as completed
            await db.from('withdrawals').update({ status: 'completed' }).eq('id', id);
            
            alert("✅ PAID & DEDUCTED!");
            loadAdminRequests();
            if(userWallet === address) refreshData();
        } catch (e) { alert("Approval Error!"); }
    }

    async function uploadCodes() {
        const btn = document.getElementById("uploadBtn");
        const input = document.getElementById("newCodesInput").value;
        const codes = input.split(',').map(c => ({ code: c.trim().toUpperCase(), is_used: false })).filter(c => c.code !== "");
        if(codes.length === 0) return;
        btn.disabled = true;
        try {
            await db.from('valid_codes').insert(codes);
            alert("Uploaded!");
            document.getElementById("newCodesInput").value = "";
        } catch(e) { alert("Upload error!"); }
        btn.disabled = false;
    }
</script>
</body>
</html>
