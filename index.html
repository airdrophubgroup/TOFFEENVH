<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOFFEENVH Claim App</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        h1 { color: #333; font-size: 22px; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; margin-bottom: 10px; transition: 0.3s; }
        #connectBtn { background: #4A90E2; color: white; }
        #claimBtn { background: #35D07F; color: white; }
        #status { font-size: 14px; color: #666; margin-top: 15px; padding: 10px; background: #f8f9fa; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍬 TOFFEENVH Project</h1>
    <div id="status">Pehle Wallet Connect Karein</div>
    
    <button class="btn" id="connectBtn">Connect Celo Wallet</button>
    
    <input type="text" id="wrapperCode" placeholder="Enter Wrapper Code">
    
    <button class="btn" id="claimBtn" disabled>Claim 10 Tokens</button>
    <p style="font-size: 11px; color: #999;">Nihal Vihar Cyber Cafe Initiative</p>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxHXis2UaZa0VnzMbak4bWGaGUhrxz1RlSnNRkzXWopUDE1srO5Z7Hv9L6NamMOWlzVuQ/exec";
    const CONTRACT_ADDRESS = "0xd9145CCE52D386F254917e481eB44e9943f39138";
    const ABI = [ "function claim(string memory _code) public" ];

    let signer, contract;

    // 1. Wallet Connect
    document.getElementById('connectBtn').onclick = async () => {
        if (window.ethereum) {
            await window.ethereum.request({ method: 'eth_requestAccounts' });
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            signer = provider.getSigner();
            document.getElementById('status').innerText = "Wallet Connected! Ab code dalein.";
            document.getElementById('claimBtn').disabled = false;
            document.getElementById('connectBtn').style.display = "none";
            contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
        } else {
            alert("MetaMask ya Valora install karein!");
        }
    };

    // 2. Claim Logic (Google Sheet + Blockchain)
    document.getElementById('claimBtn').onclick = async () => {
        const code = document.getElementById('wrapperCode').value.trim();
        if (!code) return alert("Pehle code dalein!");

        try {
            document.getElementById('status').innerText = "Checking Code in Google Sheet...";
            
            // Google Sheet se verify karo
            const res = await fetch(`${GOOGLE_URL}?code=${code}`);
            const result = await res.text();

            if (result === "VALID") {
                document.getElementById('status').innerText = "Code Verified! Blockchain confirm karein...";
                
                // Blockchain par claim karo
                const tx = await contract.claim(code);
                document.getElementById('status').innerText = "Transaction Pending... Wait karein";
                await tx.wait();

                document.getElementById('status').innerText = "SUCCESS! 10 Tokens Received 🍬";
                alert("Mubarak ho! Tokens bhej diye gaye hain.");
                document.getElementById('wrapperCode').value = "";
            } else {
                document.getElementById('status').innerText = "Invalid ya Used Code!";
                alert("Ye code galat hai ya pehle hi use ho chuka hai.");
            }
        } catch (err) {
            console.error(err);
            document.getElementById('status').innerText = "Error: Transaction fail ho gayi.";
        }
    };
</script>

</body>
</html>
