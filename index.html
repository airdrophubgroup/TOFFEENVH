<script>
    // --- STEP 1: Supabase Setup ---
    const SB_URL = 'https://xshsfgyfbbnommuhvwat.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzaHNmZ3lmYmJub21tdWh2d2F0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTA4OTYsImV4cCI6MjA4OTU2Njg5Nn0.bv_tP_jH74wzDz99tFBYlcaaZRPqmIkXnYvI_aUbKpo';
    
    // Alag naam use kar rahe hain taaki "Already Declared" wala error kabhi na aaye
    const myToffeeDB = supabase.createClient(SB_URL, SB_KEY);
    let userWallet = "";

    // --- STEP 2: Wallet Function (Window level par define kiya hai) ---
    window.connectWallet = async function() {
        console.log("Button clicked!"); // Console mein check karne ke liye
        if (window.ethereum) {
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userWallet = accounts[0].toLowerCase();
                document.getElementById("walletBtn").innerText = "Connected: " + userWallet.substring(0,8) + "...";
                alert("Wallet Connected: " + userWallet);
                loadBalance();
            } catch (err) {
                console.error(err);
                alert("Login Cancelled");
            }
        } else {
            alert("MetaMask extension nahi mila. Please install karein.");
        }
    };

    async function loadBalance() {
        if (!userWallet) return;
        const { data, error } = await myToffeeDB.from('user_balances').select('*').eq('wallet_address', userWallet).single();
        if (data) updateUI(data.pending_balance);
    }

    function updateUI(bal) {
        document.getElementById("balText").innerText = bal + " / 500 TOFFEE";
        let pct = (bal / 500) * 100;
        document.getElementById("progressBar").style.width = Math.min(pct, 100) + "%";
        document.getElementById("pctText").innerText = Math.floor(Math.min(pct, 100)) + "% Completed";
        if (bal >= 500) {
            document.getElementById("withdrawBtn").style.display = "block";
            document.getElementById("claimBtn").style.display = "none";
        }
    }

    window.processClaim = async function() {
        const codeInput = document.getElementById("codeInput");
        const code = codeInput.value.trim();
        if (!userWallet) return alert("Pehle Wallet Connect karein!");
        if (!code) return alert("Code likhna zaroori hai!");

        // Database logic
        const { data } = await myToffeeDB.from('user_balances').select('*').eq('wallet_address', userWallet).single();
        let newBal = data ? data.pending_balance + 10 : 10;
        
        const { error } = await myToffeeDB.from('user_balances').upsert({ 
            wallet_address: userWallet, 
            pending_balance: newBal 
        });

        if (error) {
            console.error(error);
            alert("Error: Database update nahi hua. Policies check karein.");
        } else {
            alert("10 Tokens Added! New Balance: " + newBal);
            codeInput.value = "";
            updateUI(newBal);
        }
    };

    window.initiateWithdrawal = function() {
        alert("Admin ko request bhej di gayi hai. Verification ka intezar karein.");
    };
</script>
