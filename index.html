<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOFFEENVH - Rewards</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --success: #10b981; --error: #ef4444; --accent: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 15px; margin: 0; }
        .container { max-width: 420px; margin: 10px auto; background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #334155; }
        .balance-card { background: #0f172a; padding: 15px; border-radius: 15px; margin: 15px 0; border: 1px solid var(--primary); }
        .progress-container { background: #334155; border-radius: 10px; height: 14px; margin: 10px 0; overflow: hidden; }
        .progress-bar { background: var(--primary); width: 0%; height: 100%; transition: 0.5s; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 2px solid #334155; background: #0f172a; color: white; outline: none; }
        button { width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; margin: 5px 0; transition: 0.2s; }
        .btn-wallet { background: var(--accent); color: #000; }
        .btn-claim { background: var(--primary); color: #000; }
        #wheel { width: 140px; height: 140px; border: 4px solid var(--accent); border-radius: 50%; margin: 15px auto; position: relative; transition: 4s cubic-bezier(0.1, 0, 0.1, 1); background: conic-gradient(#38bdf8 0deg 72deg, #1e293b 72deg 144deg, #10b981 144deg 216deg, #f59e0b 216deg 288deg, #ef4444 288deg 360deg); }
        .wheel-needle { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 20px solid white; z-index: 5; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--primary); margin:0;">🍬 TOFFEENVH</h2>
    <p style="font-size: 12px; color: #94a3b8;">Nihal Vihar Digital Rewards</p>

    <button id="walletBtn" class="btn-wallet" onclick="connectWallet()">Connect MetaMask</button>

    <div id="userUI">
        <div class="balance-card">
            <div style="display: flex; justify-content: space-between; font-size: 13px;">
                <span>Balance</span>
                <span id="balText" style="color: var(--primary);">0 / 500 TOFFEE</span>
            </div>
            <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>
        </div>

        <input type="text" id="codeInput" placeholder="Enter Wrapper Code">
        <button class="btn-claim" id="claimBtn" onclick="processClaim()">CLAIM 10 TOKENS</button>

        <div class="balance-card" style="border-color: var(--accent);">
            <div class="wheel-needle"></div>
            <div id="wheel"></div>
            <button class="btn-wallet" style="margin-top:10px;" id="spinBtn" onclick="handleSpin()">DAILY SPIN</button>
            <p id="spinTimer" style="font-size: 11px; color: var(--error); display: none;"></p>
        </div>
    </div>
</div>

<script>
    const SB_URL = 'https://xshsfgyfbbnommuhvwat.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzaHNmZ3lmYmJub21tdWh2d2F0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTA4OTYsImV4cCI6MjA4OTU2Njg5Nn0.bv_tP_jH74wzDz99tFBYlcaaZRPqmIkXnYvI_aUbKpo';
    const db = supabase.createClient(SB_URL, SB_KEY);
    let userWallet = "";

    async function connectWallet() {
        if (window.ethereum) {
            const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userWallet = accs[0].toLowerCase();
            document.getElementById("walletBtn").innerText = userWallet.substring(0,10) + "...";
            loadBalance();
        } else { alert("Open in MetaMask Browser!"); }
    }

    async function loadBalance() {
        if(!userWallet) return;
        const { data } = await db.from('user_balances').select('pending_balance').eq('wallet_address', userWallet).maybeSingle();
        const bal = data ? data.pending_balance : 0;
        document.getElementById("balText").innerText = bal + " / 500 TOFFEE";
        document.getElementById("progressBar").style.width = Math.min((bal/500)*100, 100) + "%";
    }

    async function processClaim() {
        const code = document.getElementById("codeInput").value.trim();
        if(!userWallet || !code) return alert("Fill details!");

        // 1. Check if code is valid and unused in Supabase
        const { data: validData, error } = await db.from('valid_codes').select('*').eq('code', code).eq('is_used', false).maybeSingle();

        if(!validData) return alert("❌ Invalid or Already Used Code!");

        // 2. Update User Balance
        const { data: cur } = await db.from('user_balances').select('pending_balance').eq('wallet_address', userWallet).maybeSingle();
        let newBal = (cur ? cur.pending_balance : 0) + 10;

        await db.from('user_balances').upsert({ wallet_address: userWallet, pending_balance: newBal, is_withdrawn: false }, { onConflict: 'wallet_address' });

        // 3. Mark code as used
        await db.from('valid_codes').update({ is_used: true }).eq('code', code);

        alert("✅ 10 TOFFEE Added!");
        loadBalance();
        document.getElementById("codeInput").value = "";
    }

    async function handleSpin() {
        if(!userWallet) return alert("Connect Wallet!");
        const btn = document.getElementById("spinBtn");
        
        const { data } = await db.from('daily_spins').select('last_spin_at').eq('wallet_address', userWallet).maybeSingle();
        if(data && (new Date() - new Date(data.last_spin_at)) < 86400000) return alert("Wait 24h!");

        btn.disabled = true;
        document.getElementById("wheel").style.transform = `rotate(${Math.floor(Math.random()*360)+1800}deg)`;

        setTimeout(async () => {
            const win = 10; // Fixed win for simple test
            const { data: b } = await db.from('user_balances').select('pending_balance').eq('wallet_address', userWallet).maybeSingle();
            await db.from('user_balances').upsert({ wallet_address: userWallet, pending_balance: (b?b.pending_balance:0)+win, is_withdrawn:false }, { onConflict: 'wallet_address' });
            await db.from('daily_spins').upsert({ wallet_address: userWallet, last_spin_at: new Date().toISOString() }, { onConflict: 'wallet_address' });
            alert("Won 10 TOFFEE!");
            loadBalance();
            btn.disabled = false;
        }, 4000);
    }
</script>
</body>
</html>
