<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOFFEENVH - Rewards</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --success: #10b981; --error: #ef4444; --accent: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 15px; margin: 0; overflow-x: hidden; }
        .container { max-width: 450px; margin: 10px auto; background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #334155; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .balance-card { background: #0f172a; padding: 18px; border-radius: 18px; margin: 12px 0; border: 1px solid var(--primary); }
        button { width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; margin: 5px 0; }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: scale(0.98); }
        .btn-wallet { background: var(--accent); color: #0f172a; }
        .btn-claim { background: var(--primary); color: #0f172a; }
        .btn-withdraw { background: var(--success); color: white; display: none; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; background: #0f172a; color: white; border: 1px solid #334155; box-sizing: border-box; }
        #wheel { width: 120px; height: 120px; border: 4px solid var(--accent); border-radius: 50%; margin: 15px auto; transition: 4s cubic-bezier(0.15, 0, 0.15, 1); background: conic-gradient(#38bdf8 0deg 72deg, #1e293b 72deg 144deg, #10b981 144deg 216deg, #f59e0b 216deg 288deg, #ef4444 288deg 360deg); }
        #adminPanel { display: none; margin-top: 30px; padding: 20px; background: #020617; border: 2px dashed var(--error); border-radius: 20px; text-align: left; }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; margin-right: 10px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: var(--primary); margin:0;">🍬 TOFFEENVH</h1>
    <button id="walletBtn" class="btn-wallet" onclick="connectWallet()">🔑 CONNECT WALLET</button>

    <div id="userUI" style="display:none;">
        <div class="balance-card">
            <div id="balText" style="font-size: 24px; font-weight: bold; color: var(--primary);">0 TOFFEE</div>
            <button id="withdrawBtn" class="btn-withdraw" onclick="requestCashOut()">🚀 WITHDRAW 500 (CASH)</button>
        </div>

        <input type="text" id="codeInput" placeholder="ENTER WRAPPER CODE">
        <button id="claimBtn" class="btn-claim" onclick="processClaim()">💰 CLAIM 10 TOKENS</button>

        <div id="spinContainer" class="balance-card" style="border-color: var(--accent); margin-top: 20px;">
            <p id="spinStatus" style="font-size:11px; margin:0; color:var(--accent);">Daily Spin: Scan wrapper first!</p>
            <div id="wheel"></div>
            <button id="spinBtn" class="btn-wallet" style="padding: 10px;" onclick="handleSpin()">🎰 SPIN NOW</button>
        </div>
        <div id="leaderboardList" style="margin-top:20px; font-size: 13px;"></div>
    </div>

    <div id="adminPanel">
        <h3 style="color: #f43f5e; margin: 0 0 10px 0;">👨‍💻 ADMIN DASHBOARD</h3>
        <textarea id="newCodesInput" placeholder="C001, C002..." rows="2"></textarea>
        <button id="uploadBtn" onclick="uploadCodes()" style="background:var(--primary); color:white;">UPLOAD CODES</button>
        <div id="reqList" style="margin-top:15px;"></div>
    </div>
</div>

<script>
    const SB_URL = 'https://xshsfgyfbbnommuhvwat.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzaHNmZ3lmYmJub21tdWh2d2F0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTA4OTYsImV4cCI6MjA4OTU2Njg5Nn0.bv_tP_jH74wzDz99tFBYlcaaZRPqmIkXnYvI_aUbKpo';
    const db = supabase.createClient(SB_URL, SB_KEY);
    const ADMIN_WALLET = "0x8fb70cdfb545c7d9b842cbe37b9aba84059bf14b";
    
    let userWallet = "";
    let userBalance = 0;
    let isSpinning = false;

    async function connectWallet() {
        if (!window.ethereum) return window.location.href = "https://metamask.app.link/dapp/toffeenvh.vercel.app/";
        try {
            const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userWallet = accs[0].toLowerCase();
            document.getElementById("walletBtn").innerText = "ID: " + userWallet.substring(0,10);
            document.getElementById("userUI").style.display = "block";
            if (userWallet === ADMIN_WALLET.toLowerCase()) document.getElementById("adminPanel").style.display = "block";
            refreshData();
        } catch (e) { alert("Wallet error!"); }
    }

    async function refreshData() {
        if(!userWallet) return;
        try {
            const { data: bData } = await db.from('user_balances').select('pending_balance').eq('wallet_address', userWallet).maybeSingle();
            userBalance = bData ? bData.pending_balance : 0;
            document.getElementById("balText").innerText = userBalance + " TOFFEE";
            
            const wBtn = document.getElementById("withdrawBtn");
            if(userBalance >= 500) {
                wBtn.style.display = "block";
                const { data: p } = await db.from('withdrawals').select('id').eq('wallet_address', userWallet).eq('status', 'pending').maybeSingle();
                wBtn.disabled = !!p;
                wBtn.innerText = p ? "⏳ PENDING..." : "🚀 WITHDRAW 500 (CASH)";
            } else wBtn.style.display = "none";
        } catch (e) { console.error("Refresh Error"); }
    }

    async function processClaim() {
        const btn = document.getElementById("claimBtn");
        const code = document.getElementById("codeInput").value.trim().toUpperCase();
        if(!code || btn.disabled) return;

        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span> CHECKING...';

        try {
            const { data: valid } = await db.from('valid_codes').select('*').eq('code', code).eq('is_used', false).maybeSingle();
            if(!valid) throw new Error("Invalid or Used!");

            // Parallel Update for speed
            await Promise.all([
                db.from('user_balances').upsert({ wallet_address: userWallet, pending_balance: userBalance + 10 }, { onConflict: 'wallet_address' }),
                db.from('valid_codes').update({ is_used: true }).eq('code', code),
                db.from('used_codes').insert([{ code: code, user_wallet: userWallet }])
            ]);

            alert("✅ Success! 10 TOFFEE added.");
            document.getElementById("codeInput").value = "";
            refreshData();
        } catch (e) { alert(e.message); }
        btn.disabled = false;
        btn.innerText = "💰 CLAIM 10 TOKENS";
    }

    async function handleSpin() {
        if(isSpinning) return;
        const sBtn = document.getElementById("spinBtn");
        sBtn.disabled = true;
        
        try {
            const today = new Date().toISOString().split('T')[0];
            const { data: already } = await db.from('used_codes').select('id').eq('user_wallet', userWallet).eq('code', 'DAILY_SPIN_DONE').gte('created_at', today).maybeSingle();
            
            if(already) throw new Error("Aaj ka spin ho gaya!");

            const { data: scanToday } = await db.from('used_codes').select('id').eq('user_wallet', userWallet).neq('code', 'DAILY_SPIN_DONE').gte('created_at', today).maybeSingle();
            if(!scanToday) throw new Error("Pehle ek wrapper scan karein!");

            isSpinning = true;
            document.getElementById("wheel").style.transform = `rotate(${Math.floor(Math.random()*360)+1800}deg)`;

            setTimeout(async () => {
                await Promise.all([
                    db.from('used_codes').insert([{ code: 'DAILY_SPIN_DONE', user_wallet: userWallet }]),
                    db.from('user_balances').upsert({ wallet_address: userWallet, pending_balance: userBalance + 10 }, { onConflict: 'wallet_address' })
                ]);
                alert("🎉 Won 10 TOFFEE!");
                isSpinning = false;
                refreshData();
            }, 4000);
        } catch (e) { alert(e.message); sBtn.disabled = false; }
    }

    async function uploadCodes() {
        const btn = document.getElementById("uploadBtn");
        const input = document.getElementById("newCodesInput").value;
        const codes = input.split(',').map(c => ({ code: c.trim().toUpperCase(), is_used: false })).filter(c => c.code !== "");
        
        if(codes.length === 0) return;
        btn.disabled = true;
        try {
            const { error } = await db.from('valid_codes').insert(codes);
            if(!error) { alert("✅ Uploaded!"); document.getElementById("newCodesInput").value = ""; }
            else throw error;
        } catch (e) { alert("Upload Failed!"); }
        btn.disabled = false;
    }
</script>
</body>
</html>
