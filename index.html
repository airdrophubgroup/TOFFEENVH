<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOFFEENVH Claim Rewards</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; width: 360px; border: 1px solid #eee; }
        h1 { color: #2c3e50; margin-bottom: 8px; font-size: 24px; }
        .subtitle { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        #status { font-size: 14px; color: #444; margin-bottom: 20px; padding: 12px; background: #fffde7; border-radius: 12px; border: 1px dashed #ffd600; min-height: 20px; }
        input { width: 90%; padding: 14px; margin-bottom: 20px; border: 2px solid #eaeeef; border-radius: 12px; font-size: 16px; transition: 0.3s; text-align: center; }
        input:focus { border-color: #3498db; outline: none; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 700; transition: 0.3s; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        #connectBtn { background: #3498db; color: white; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3); }
        #claimBtn { background: #2ecc71; color: white; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3); }
        #claimBtn:disabled { background: #bdc3c7; cursor: not-allowed; box-shadow: none; }
        .footer { font-size: 11px; color: #bdc3c7; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🍬 TOFFEENVH</h1>
    <p class="subtitle">Nihal Vihar Digital Rewards</p>
    
    <div id="status">Pehle Wallet Connect Karein</div>
    
    <button class="btn" id="connectBtn">1. Connect Wallet</button>
    
    <input type="text" id="wrapperCode" placeholder="Enter Wrapper Code (TF-XXXX)">
    
    <button class="btn" id="claimBtn" disabled>2. Claim 10 Tokens</button>
    
    <div class="footer">Nihal Vihar Cyber Cafe Project • Celo Network</div>
</div>

<script>
    // --- FINAL SETTINGS ---
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxHXis2UaZa0VnzMbak4bWGaGUhrxz1RlSnNRkzXWopUDE1srO5Z7Hv9L6NamMOWlzVuQ/exec";
    const CONTRACT_ADDRESS = "0xd9145CCE52D386F254917e481eB44e9943f39138";
    const ABI = [ "function claim(string memory _code) public" ];

    let signer, contract;

    // 1. Connect Wallet Logic
    document.getElementById('connectBtn').onclick = async () => {
        if (window.ethereum) {
            try {
                document.getElementById('status').innerText = "Connecting...";
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                const address = await signer.getAddress();
                
                document.getElementById('status').innerText = "Connected: " + address.substring(0,6) + "..." + address.substring(address.length - 4);
                document.getElementById('claimBtn').disabled = false;
                document.getElementById('connectBtn').style.display = "none";
                
                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
            } catch (err) {
                document.getElementById('status').innerText = "Connection Failed!";
                console.error(err);
            }
        } else {
            alert("Please use MetaMask Browser or install MetaMask!");
        }
    };

    // 2. Claim Logic
    document.getElementById('claimBtn').onclick = async () => {
        const codeInput = document.getElementById('wrapperCode');
        const code = codeInput.value.trim();
        const statusDiv = document.getElementById('status');

        if (!code) return alert("Pehle code dalein!");

        try {
            statusDiv.innerText = "Verifying code with Google Sheets...";
            statusDiv.style.background = "#e3f2fd";

            // Clean Fetch for MetaMask Browser
            const response = await fetch(`${GOOGLE_URL}?code=${encodeURIComponent(code)}`, {
                method: 'GET',
                redirect: 'follow'
            });
            const result = await response.text();

            if (result.trim() === "VALID") {
                statusDiv.innerText = "Code Verified! Confirming on Blockchain...";
                statusDiv.style.background = "#e8f5e9";

                // Smart Contract Call
                const tx = await contract.claim(code);
                statusDiv.innerText = "Transaction Pending... Don't Close!";
                
                await tx.wait();

                statusDiv.innerText = "SUCCESS! 10 Tokens Claimed 🍬";
                statusDiv.style.background = "#c8e6c9";
                alert("Mubarak ho! Tokens aapke wallet mein bhej diye gaye hain.");
                codeInput.value = "";
            } else {
                statusDiv.innerText = "Invalid ya Used Code! Dubara check karein.";
                statusDiv.style.background = "#ffecb3";
            }
        } catch (err) {
            console.error(err);
            statusDiv.innerText = "Error: Check your Balance or Network.";
            statusDiv.style.background = "#ffcdd2";
        }
    };
</script>

</body>
</html>
