<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --success: #10b981; --error: #ef4444; --accent: #f59e0b; --gold: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 15px; margin: 0; }
        .container { max-width: 480px; margin: 10px auto; background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #334155; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .balance-card { background: #0f172a; padding: 20px; border-radius: 18px; margin: 15px 0; border: 1px solid var(--primary); }
        
        /* Store Styles */
        .store-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .product-card { background: #0f172a; border: 1px solid #334155; border-radius: 15px; padding: 12px; opacity: 0.8; }
        .product-img { width: 100%; height: 70px; background: #1e293b; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 8px; }
        .coming-soon-tag { position: absolute; top: 10px; right: 10px; background: var(--error); color: white; font-size: 8px; padding: 2px 5px; border-radius: 5px; font-weight: bold; }
        .btn-redeem { width: 100%; padding: 10px; background: #334155; color: #94a3b8; border-radius: 10px; font-size: 12px; border: none; cursor: not-allowed; font-weight: bold; }

        input { width: 85%; padding: 14px; margin: 10px 0; border-radius: 12px; background: #0f172a; color: white; border: 2px solid #334155; font-size: 16px; outline: none; text-transform: uppercase; }
        button { width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        .btn-wallet { background: var(--accent); color: #0f172a; }
        .btn-claim { background: var(--primary); color: #0f172a; }
        
        /* Spinner */
        #wheel { width: 120px; height: 120px; border: 5px solid var(--accent); border-radius: 50%; margin: 15px auto; position: relative; transition: 4s cubic-bezier(0.15, 0, 0.15, 1); background: conic-gradient(#38bdf8 0deg 72deg, #1e293b 72deg 144deg, #10b981 144deg 216deg, #f59e0b 216deg 288deg, #ef4444 288deg 360deg); }
        #adminPanel { display: none; margin-top: 30px; padding: 20px; background: #020617; border: 2px dashed var(--error); border-radius: 20px; text-align: left; }
    </style>
</head>
