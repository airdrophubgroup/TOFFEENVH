<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>TOFFEENVH - Rewards</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --success: #10b981; --accent: #f59e0b; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 15px; margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        /* Container settings */
        .container { max-width: 450px; margin: 10px auto; background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid #334155; position: relative; z-index: 1; }

        /* 🚨 THE ULTIMATE METAMASK INPUT FIX 🚨 */
        .input-wrapper {
            position: relative;
            margin: 20px 0;
            width: 100%;
            z-index: 99999 !important; /* Extremely high z-index */
        }

        input#codeInput {
            width: 100% !important;
            height: 60px !important;
            background: #020617 !important;
            color: #ffffff !important;
            border: 3px solid var(--primary) !important;
            border-radius: 15px !important;
            font-size: 18px !important; /* Bigger font to prevent zoom */
            padding: 0 15px !important;
            box-sizing: border-box !important;
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            /* Force focus ability */
            -webkit-user-select: text !important;
            user-select: text !important;
            cursor: text !important;
        }

        /* Highlight when focused */
        input#codeInput:focus {
            border-color: var(--accent) !important;
            background: #0f172a !important;
            box-shadow: 0 0 15px var(--primary);
        }

        button { width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; margin: 10px 0; }
        .btn-wallet { background: var(--accent); color: #0f172a; }
        .btn-claim { background: var(--primary); color: #0f172a; font-size: 16px; }
        .btn-withdraw { background: var(--success); color: white; display: none; }

        /* Dashboard & Socials */
        .balance-card { background: #0f172a; padding: 20px; border-radius: 18px; border: 1px solid var(--primary); margin-bottom: 15px; }
        .social-box { display: flex; justify-content: space-around; margin-top: 20px; padding: 15px; background: #020617; border-radius: 15px; border: 1px solid var(--primary); }
        .social-box a { color: var(--text); text-decoration: none; font-size: 12px; display: flex; flex-direction: column; align-items: center; }
        
        #adminPanel { display: none; margin-top: 30px; padding: 20px; background: #020617; border: 2px dashed var(--error); border-radius: 20px; text-align: left; }
        .req-card { background: #1e293b; padding: 12px; border-radius: 12px; margin-top: 10px; border-left: 4px solid var(--success); }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: var(--primary); margin:0;">🍬 TOFFEENVH</h1>
    <p style="font-size: 11px; color: var(--accent); margin-bottom: 20px;">Nihal Vihar's Digital Sweet Reward</p>

    <button id="walletBtn" class="btn-wallet" onclick="connectWallet()">🔑 CONNECT WALLET</button>

    <div id="userUI" style="display:none;">
        <div class="balance-card">
            <span id="balText" style="font-size: 32px; font-weight: bold; color: var(--primary);">0 TOFFEE</span>
            <button id="withdrawBtn" class="btn-withdraw" onclick="requestWithdrawal()">🚀 WITHDRAW 500</button>
        </div>

        <div class="input-wrapper">
            <input type="text" id="codeInput" placeholder="TAP HERE TO TYPE CODE" inputmode="text" autocomplete="off">
        </div>
        
        <button id="claimBtn" class="btn-claim" onclick="processClaim()">💰 CLAIM 10 TOKENS</button>
    </div>

    <div class="social-box">
        <a href="https://t.me/ToffeenVh" target="_blank"><span>✈️</span>Telegram</a>
        <a href="https://x.com/ToffeenVh" target="_blank"><span>🐦</span>X (Twitter)</a>
        <a href="https://www.youtube.com/@ToffeeTeam" target="_blank"><span>🎥</span>YouTube</a>
    </div>

    <div id="adminPanel">
        <h3 style="color: var(--error);">👨‍💻 OWNER DASHBOARD</h3>
        <textarea id="newCodesInput" placeholder="C01, C02..." rows="2" style="width:100%; background:white; color:black; border-radius:10px; padding:10px;"></textarea>
        <button onclick="uploadCodes()" style="background:var(--primary); color:white;">⬆️ UPLOAD CODES</button>
        <div id="reqList" style="font-size: 11px; margin-top:10px;"></div>
    </div>
</div>

<script>
    const SB_URL = 'https://xshsfgyfbbnommuhvwat.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzaHNmZ3lmYmJub21tdWh2d2F0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTA4OTYsImV4cCI6MjA4OTU2Njg5Nn0.bv_tP_jH74wzDz99tFBYlcaaZRPqmIkXnYvI_aUbKpo';
    const db = supabase.createClient(SB_URL, SB_KEY);
    const ADMIN_WALLET = "0x8fb70cdfb545c7d9b842cbe37b9aba84059bf14b";
    
    let userWallet = "";
    let userBalance = 0;

    // 🚨 METAMASK TOUCH FORCE FOCUS 🚨
    const inputField = document.getElementById('codeInput');
    
    // Force focus on any touch inside the input wrapper
    document.querySelector('.input-wrapper').addEventListener('touchstart', function(e) {
        inputField.style.zIndex = "999999";
        inputField.focus();
    }, {passive: false});

    async function connectWallet() {
        try {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userWallet = accounts[0].toLowerCase();
                document.getElementById("walletBtn").innerText = "ID: " + userWallet.substring(0,10);
                document.getElementById("userUI").style.display = "block";
                if (userWallet === ADMIN_WALLET.toLowerCase()) {
                    document.getElementById("adminPanel").style.display = "block";
                    loadAdminRequests();
                }
                refreshData();
            } else { alert("Open this in MetaMask Browser!"); }
        } catch (e) { alert("Wallet Error!"); }
    }

    async function refreshData() {
        if(!userWallet) return;
        const { data } = await db.from('user_balances').select('pending_balance').eq('wallet_address', userWallet).maybeSingle();
        userBalance = data ? data.pending_balance : 0;
        document.getElementById("balText").innerText = userBalance + " TOFFEE";
        const wBtn = document.getElementById("withdrawBtn");
        if(userBalance >= 500) {
            const { data: pending } = await db.from('withdrawals').select('id').eq('wallet_address', userWallet).eq('status', 'pending').maybeSingle();
            wBtn.style.display = "block";
            wBtn.disabled = !!pending;
            wBtn.innerText = pending ? "⏳ PENDING..." : "🚀 WITHDRAW 500";
        }
    }

    async function processClaim() {
        const btn = document.getElementById("claimBtn");
        const code = inputField.value.trim().toUpperCase();
        if(!code || btn.disabled) return;
        
        btn.disabled = true;
        btn.innerText = "⌛ CHECKING...";
        try {
            const { data: valid } = await db.from('valid_codes').select('*').eq('code', code).eq('is_used', false).maybeSingle();
            if (!valid) {
                alert("❌ INVALID OR USED CODE!");
            } else {
                await db.from('user_balances').upsert({ wallet_address: userWallet, pending_balance: userBalance + 10 });
                await db.from('valid_codes').update({ is_used: true }).eq('code', code);
                
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } });
                alert("✅ RECEIVED 10 TOFFEE TOKENS!");
                inputField.value = "";
                refreshData(); 
            }
        } catch (e) { alert("Error!"); }
        btn.disabled = false;
        btn.innerText = "💰 CLAIM 10 TOKENS";
    }

    // Admin & Support Functions
    async function uploadCodes() {
        const input = document.getElementById("newCodesInput").value;
        const codes = input.split(',').map(c => ({ code: c.trim().toUpperCase(), is_used: false })).filter(c => c.code !== "");
        const { error } = await db.from('valid_codes').insert(codes);
        if(!error) { alert("✅ CODE SUCCESSFULLY UPLOADED!"); document.getElementById("newCodesInput").value = ""; }
    }

    async function loadAdminRequests() {
        const { data: reqs } = await db.from('withdrawals').select('*').eq('status', 'pending');
        let h = "";
        reqs?.forEach(r => {
            h += `<div class="req-card">${r.wallet_address.substring(0,15)}... <button onclick="approveWithdrawal(${r.id}, '${r.wallet_address}')" style="width:auto; padding:5px; font-size:10px; background:var(--success); color:white;">PAID</button></div>`;
        });
        document.getElementById("reqList").innerHTML = h || "No requests.";
    }

    async function approveWithdrawal(id, address) {
        if(!confirm("Deduct 500?")) return;
        const { data: user } = await db.from('user_balances').select('pending_balance').eq('wallet_address', address).single();
        await db.from('user_balances').update({ pending_balance: user.pending_balance - 500 }).eq('wallet_address', address);
        await db.from('withdrawals').update({ status: 'completed' }).eq('id', id);
        alert("DONE!");
        loadAdminRequests();
        refreshData();
    }
</script>
</body>
</html>
