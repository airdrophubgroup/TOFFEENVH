<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOFFEENVH - Official</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --success: #10b981; --error: #ef4444; --accent: #f59e0b; --gold: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 15px; margin: 0; }
        .container { max-width: 450px; margin: 10px auto; background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #334155; }
        .balance-card { background: #0f172a; padding: 18px; border-radius: 18px; margin: 12px 0; border: 1px solid var(--primary); }
        button { width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; margin: 5px 0; }
        .btn-wallet { background: var(--accent); color: #0f172a; }
        .btn-claim { background: var(--primary); color: #0f172a; }
        .btn-withdraw { background: var(--success); color: white; display: none; margin-top: 10px; }
        .btn-withdraw:disabled { background: #334155; opacity: 0.7; cursor: not-allowed; }
        .leaderboard { background: #020617; border-radius: 18px; padding: 15px; margin: 15px 0; border: 1px solid var(--gold); font-size: 13px; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #1e293b; }
        input { width: 85%; padding: 14px; margin: 8px 0; border-radius: 12px; background: #0f172a; color: white; border: 2px solid #334155; outline: none; text-transform: uppercase; }
        #wheel { width: 120px; height: 120px; border: 4px solid var(--accent); border-radius: 50%; margin: 15px auto; transition: 4s cubic-bezier(0.15, 0, 0.15, 1); background: conic-gradient(#38bdf8 0deg 72deg, #1e293b 72deg 144deg, #10b981 144deg 216deg, #f59e0b 216deg 288deg, #ef4444 288deg 360deg); }
        #adminPanel { display: none; margin-top: 30px; padding: 20px; background: #020617; border: 2px dashed var(--error); border-radius: 20px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: var(--primary); margin:0;">🍬 TOFFEENVH</h1>
    <button id="walletBtn" class="btn-wallet" onclick="connectWallet()">🔑 CONNECT WALLET</button>

    <div id="userUI" style="display:none;">
        <div class="balance-card">
            <span id="balText" style="font-size: 24px; font-weight: bold; color: var(--primary);">0 TOFFEE</span>
            <button id="withdrawBtn" class="btn-withdraw" onclick="requestCashOut()">🚀 WITHDRAW 500 (CASH)</button>
        </div>

        <input type="text" id="codeInput" placeholder="ENTER WRAPPER CODE">
        <button class="btn-claim" onclick="processClaim()">💰 CLAIM 10 TOKENS</button>

        <div class="leaderboard">
            <h3 style="margin: 0; color: var(--gold); font-size: 15px;">🏆 TOP 5 KINGS</h3>
            <div id="leaderboardList"></div>
        </div>

        <div class="balance-card" style="border-color: var(--accent); margin-top: 25px;">
            <div id="wheel"></div>
            <button class="btn-wallet" style="padding: 10px;" onclick="handleSpin()">🎰 SPIN NOW</button>
        </div>
    </div>

    <div id="adminPanel">
        <h3 style="color: #f43f5e;">👨‍💻 ADMIN DASHBOARD</h3>
        <div id="reqList">Fetching...</div>
    </div>
</div>

<script>
    const SB_URL = 'https://xshsfgyfbbnommuhvwat.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzaHNmZ3lmYmJub21tdWh2d2F0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTA4OTYsImV4cCI6MjA4OTU2Njg5Nn0.bv_tP_jH74wzDz99tFBYlcaaZRPqmIkXnYvI_aUbKpo';
    const db = supabase.createClient(SB_URL, SB_KEY);
    const ADMIN_WALLET = "0x8fb70cdfb545c7d9b842cbe37b9aba84059bf14b";
    
    let userWallet = "";
    let userBalance = 0;

    async function connectWallet() {
        if (typeof window.ethereum !== 'undefined') {
            try {
                // Fixed: explicitly request accounts
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if (accounts.length > 0) {
                    userWallet = accounts[0].toLowerCase();
                    document.getElementById("walletBtn").innerText = "ID: " + userWallet.substring(0,8);
                    document.getElementById("userUI").style.display = "block";
                    
                    if (userWallet === ADMIN_WALLET) {
                        document.getElementById("adminPanel").style.display = "block";
                        loadAdminPanel();
                    }
                    refreshData();
                } else {
                    alert("No accounts found!");
                }
            } catch (err) {
                alert("Connection denied!");
            }
        } else {
            alert("MetaMask App Browser mein kholein!");
            window.location.href = "https://metamask.app.link/dapp/toffeenvh.vercel.app/";
        }
    }

    async function refreshData() {
        if(!userWallet) return;
        
        // Balance fetch
        const { data: balData } = await db.from('user_balances').select('pending_balance').eq('wallet_address', userWallet).maybeSingle();
        userBalance = balData ? balData.pending_balance : 0;
        document.getElementById("balText").innerText = userBalance + " TOFFEE";
        
        // Withdraw Button logic
        const wBtn = document.getElementById("withdrawBtn");
        const { data: pending } = await db.from('withdrawals').select('*').eq('wallet_address', userWallet).eq('status', 'pending').maybeSingle();
        
        if (pending) {
            wBtn.style.display = "block";
            wBtn.disabled = true;
            wBtn.innerText = "⏳ REQUEST PENDING...";
        } else if (userBalance >= 500) {
            wBtn.style.display = "block";
            wBtn.disabled = false;
            wBtn.innerText = "🚀 WITHDRAW 500 (CASH)";
        } else {
            wBtn.style.display = "none";
        }
        
        loadLeaderboard();
    }

    async function loadLeaderboard() {
        const { data } = await db.from('used_codes').select('user_wallet');
        const counts = {};
        data?.forEach(i => counts[i.user_wallet] = (counts[i.user_wallet] || 0) + 1);
        const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0,5);
        let h = "";
        sorted.forEach((e, i) => h += `<div class="rank-item"><span>#${i+1} ${e[0].slice(0,6)}...</span><b>${e[1]} Scans</b></div>`);
        document.getElementById("leaderboardList").innerHTML = h || "No scans yet.";
    }

    async function processClaim() {
        const input = document.getElementById("codeInput");
        const code = input.value.trim().toUpperCase();
        if(!code) return alert("Code dalein!");

        const { data: valid } = await db.from('valid_codes').select('*').eq('code', code).eq('is_used', false).maybeSingle();
        if(!valid) return alert("Invalid or Used Code!");

        const { error } = await db.from('user_balances').upsert({ wallet_address: userWallet, pending_balance: userBalance + 10, is_withdrawn: false }, { onConflict: 'wallet_address' });
        
        if(!error) {
            await db.from('valid_codes').update({ is_used: true }).eq('code', code);
            await db.from('used_codes').insert([{ code: code, user_wallet: userWallet }]);
            alert("✅ 10 TOFFEE Added!");
            input.value = "";
            refreshData();
        }
    }

    async function requestCashOut() {
        const { error } = await db.from('withdrawals').insert([{ 
            wallet_address: userWallet, 
            amount: 500, 
            status: 'pending',
            product_name: 'CASH' 
        }]);
        if(!error) { alert("🚀 Request Sent!"); refreshData(); }
        else { alert("Database Issue! Check SQL Settings."); }
    }

    async function handleSpin() {
        const today = new Date(); today.setHours(0,0,0,0);
        const { data: claimed } = await db.from('used_codes').select('*').eq('user_wallet', userWallet).gte('created_at', today.toISOString());
        if(!claimed || claimed.length === 0) return alert("Pehle aaj ek wrapper claim karein!");
        
        document.getElementById("wheel").style.transform = `rotate(${Math.floor(Math.random()*360)+1800}deg)`;
        setTimeout(async () => {
            await db.from('user_balances').upsert({ wallet_address: userWallet, pending_balance: userBalance + 10, is_withdrawn: false }, { onConflict: 'wallet_address' });
            alert("🎉 Won 10 TOFFEE!"); refreshData();
        }, 4000);
    }

    async function loadAdminPanel() {
        const { data: reqs } = await db.from('withdrawals').select('*').eq('status', 'pending');
        let html = "<b>Pending Requests:</b><br>";
        if(reqs?.length > 0) {
            reqs.forEach(r => html += `<div style='background:#111827; padding:8px; margin-top:5px; border-radius:8px;'>
                User: ${r.wallet_address.slice(0,10)}... | <button onclick="approveAdmin(${r.id}, '${r.wallet_address}')" style="background:var(--success); color:white; padding:3px; border-radius:4px; font-size:10px;">PAID</button>
            </div>`);
        } else { html += "No requests."; }
        document.getElementById("reqList").innerHTML = html;
    }

    async function approveAdmin(id, userAddr) {
        await db.from('withdrawals').update({ status: 'completed' }).eq('id', id);
        const { data } = await db.from('user_balances').select('pending_balance').eq('wallet_address', userAddr).single();
        await db.from('user_balances').update({ pending_balance: data.pending_balance - 500 }).eq('wallet_address', userAddr);
        alert("Paid!"); loadAdminPanel(); refreshData();
    }
</script>
</body>
</html>
