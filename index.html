<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Typing Fix Test</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .test-box {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        /* HARD FIX FOR INPUT */
        input {
            width: 100%;
            height: 60px; /* Bada tap area */
            background: #1e293b !important;
            border: 2px solid #38bdf8 !important;
            border-radius: 12px;
            color: white !important;
            font-size: 18px !important; /* Force 16px+ for no zoom */
            padding: 0 15px;
            box-sizing: border-box;
            outline: none;
            /* Inset shadow se pata chalta hai focus hai */
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            
            /* Disable any browser interference */
            -webkit-user-select: text !important;
            user-select: text !important;
            cursor: text !important;
        }
        input:focus {
            background: #2d3e50 !important;
            border-color: #f59e0b !important;
        }
        label {
            display: block;
            margin-bottom: 10px;
            color: #38bdf8;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="test-box">
    <label for="codeInput">YAHAN CLICK KAREIN (TYPING TEST):</label>
    <input type="text" id="codeInput" placeholder="TYPE SOMETHING..." inputmode="text">
    <p style="font-size: 12px; margin-top: 20px; color: #64748b;">
        Agar yahan typing ho rahi hai, toh iska matlab purane code mein koi overlay (layer) input ko hide kar raha tha.
    </p>
</div>

<script>
    // Force focus on load for testing
    window.onload = () => {
        const input = document.getElementById('codeInput');
        input.addEventListener('touchstart', function() {
            input.focus();
        });
    };
</script>

</body>
</html>
