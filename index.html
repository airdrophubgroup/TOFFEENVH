<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, interactive-widget=resizes-content">
    <title>TOFFEENVH - Rewards</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --success: #10b981; --error: #ef4444; --accent: #f59e0b; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 15px; margin: 0; line-height: 1.6; -webkit-tap-highlight-color: transparent; }
        
        .container { max-width: 450px; margin: 10px auto; background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #334155; box-shadow: 0 10px 40px rgba(0,0,0,0.6); position: relative; }
        
        .balance-card { background: #0f172a; padding: 18px; border-radius: 18px; margin: 12px 0; border: 1px solid var(--primary); }
        
        /* 🚨 METAMASK TYPING HARD FIX 🚨 */
        input#codeInput { 
            width: 100% !important; 
            height: 55px !important; 
            margin: 15px 0 !important; 
            border-radius: 12px !important; 
            background: #020617 !important; 
            color: #ffffff !important; 
            border: 2px solid var(--primary) !important; 
            box-sizing: border-box !important; 
            outline: none !important; 
            font-size: 16px !important; /* Stop Auto-zoom */
            display: block !important;
            
            /* High Z-index to stay above MetaMask overlays */
            position: relative !important;
            z-index: 999999 !important; 
            
            /* Force touch events */
            pointer-events: auto !important;
            touch-action: manipulation !important;
            -webkit-user-select: text !important;
            user-select: text !important;
        }

        input#codeInput:focus { border-color: var(--accent) !important; background: #0f172a !important; }

        button { width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; margin: 8px 0; position: relative; z-index: 10; }
        .btn-wallet { background: var(--accent); color: #0f172a; }
        .btn-claim { background: var(--primary); color: #0f172a; }
        .btn-withdraw { background: var(--success); color: white; display: none; }

        .info-card { text-align: left; margin-top: 25px; padding: 18px; background: rgba(15, 23, 42, 0.5); border-radius: 18px; border: 1px solid #334155; }
        .social-box { display: flex; justify-content: space-around; margin-top: 20px; padding: 15px; background: #020617; border-radius: 15px; border: 1px solid var(--primary); }
        .social-box a { color: var(--text); text-decoration: none; font-size: 12px; font-weight: bold; display: flex; flex-direction: column; align-items: center; }
        footer { margin-top: 40px; padding-bottom: 30px; font-size: 11px; opacity: 0.6; }
        
        #adminPanel { display: none; margin-top: 30px; padding: 20px; background: #020617; border: 2px dashed var(--error); border-radius: 20px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: var(--primary); margin:0;">🍬 TOFFEENVH</h1>
    <p style="font-size: 11px; color: var(--accent);">Nihal Vihar to the Moon! 🚀</p>

    <button id="walletBtn" class="btn-wallet" onclick="connectWallet()">🔑 CONNECT WALLET</button>

    <div id="userUI" style="display:none;">
        <div class="balance-card">
            <span id="balText" style="font-size: 28px; font-weight: bold; color: var(--primary);">0 TOFFEE</span>
            <button id="withdrawBtn" class="btn-withdraw" onclick="requestWithdrawal()">🚀 WITHDRAW 500 (CASH)</button>
        </div>

        <input type="text" id="codeInput" placeholder="CLICK HERE TO ENTER CODE" inputmode="text" autocomplete="off" enterkeyhint="done">
        
        <button id="claimBtn" class="btn-claim" onclick="processClaim()">💰 CLAIM 10 TOKENS</button>

        <button style="background:transparent; color:#64748b; font-size:11px; margin-top:10px;" onclick="location.reload()">🔄 Switch Wallet</button>
    </div>

    <div class="info-card">
        <h3>📖 About & Roadmap</h3>
        <p style="font-size: 13px;">Cyber Cafe se shuru hua ye digital safar. 2026 Goals: QR Packaging & Shop Network.</p>
    </div>

    <div class="social-box">
        <a href="https://t.me/ToffeenVh" target="_blank"><span>✈️</span>Telegram</a>
        <a href="https://x.com/ToffeenVh" target="_blank"><span>🐦</span>X (Twitter)</a>
        <a href="https://www.youtube.com/@ToffeeTeam" target="_blank"><span>🎥</span>YouTube</a>
    </div>

    <div id="adminPanel">
        <h3 style="color: var(--error);">👨‍💻 OWNER DASHBOARD</h3>
        <textarea id="newCodesInput" placeholder="C001, C002..." rows="2" style="width:100%; color:black;"></textarea>
        <button id="uploadBtn" onclick="uploadCodes()" style="background:var(--primary); color:white;">UPLOAD CODES</button>
        <div id="reqList" style="font-size: 11px; margin-top:10px;"></div>
    </div>
</div>

<footer>© 2026 ToffeeNVH | Nihal Vihar</footer>

<script>
    const SB_URL = 'https://xshsfgyfbbnommuhvwat.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzaHNmZ3lmYmJub21tdWh2d2F0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTA4OTYsImV4cCI6MjA4OTU2Njg5Nn0.bv_tP_jH74wzDz99tFBYlcaaZRPqmIkXnYvI_aUbKpo';
    const db = supabase.createClient(SB_URL, SB_KEY);
    const ADMIN_WALLET = "0x8fb70cdfb545c7d9b842cbe37b9aba84059bf14b";
    
    let userWallet = "";
    let userBalance = 0;

    // Force Focus Hack for MetaMask Mobile
    const inputField = document.getElementById('codeInput');
    if(inputField) {
        inputField.addEventListener('touchstart', function(e) {
            this.focus();
        }, {passive: true});
    }

    async function connectWallet() {
        try {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userWallet = accounts[0].toLowerCase();
                document.getElementById("walletBtn").innerText = "ID: " + userWallet.substring(0,10);
                document.getElementById("userUI").style.display = "block";
                if (userWallet === ADMIN_WALLET.toLowerCase()) {
                    document.getElementById("adminPanel").style.display = "block";
                    loadAdminRequests();
                }
                refreshData();
            } else {
                window.location.href = "https://metamask.app.link/dapp/toffeenvh.vercel.app/";
            }
        } catch (e) { alert("Wallet Error!"); }
    }

    async function refreshData() {
        if(!userWallet) return;
        try {
            const { data } = await db.from('user_balances').select('pending_balance').eq('wallet_address', userWallet).maybeSingle();
            userBalance = data ? data.pending_balance : 0;
            document.getElementById("balText").innerText = userBalance + " TOFFEE";
            const wBtn = document.getElementById("withdrawBtn");
            if(userBalance >= 500) {
                const { data: pending } = await db.from('withdrawals').select('id').eq('wallet_address', userWallet).eq('status', 'pending').maybeSingle();
                wBtn.style.display = "block";
                wBtn.disabled = !!pending;
                wBtn.innerText = pending ? "⏳ PENDING" : "🚀 WITHDRAW 500";
            } else { wBtn.style.display = "none"; }
        } catch (e) { console.error("Sync Error"); }
    }

    async function processClaim() {
        const btn = document.getElementById("claimBtn");
        const code = inputField.value.trim().toUpperCase();
        if(!code || btn.disabled) return;
        btn.disabled = true;
        btn.innerText = "⌛ CHECKING...";
        try {
            const { data: valid } = await db.from('valid_codes').select('*').eq('code', code).eq('is_used', false).maybeSingle();
            if (!valid) throw new Error("Invalid or Used Code!");
            await db.from('user_balances').upsert({ wallet_address: userWallet, pending_balance: userBalance + 10 }, { onConflict: 'wallet_address' });
            await db.from('valid_codes').update({ is_used: true }).eq('code', code);
            alert("✅ 10 TOFFEE Added!");
            inputField.value = "";
            refreshData(); 
        } catch (e) { alert(e.message); }
        btn.disabled = false;
        btn.innerText = "💰 CLAIM 10 TOKENS";
    }

    async function requestWithdrawal() {
        const btn = document.getElementById("withdrawBtn");
        btn.disabled = true;
        try {
            await db.from('withdrawals').insert([{ wallet_address: userWallet, amount: 500, status: 'pending' }]);
            alert("🚀 Request sent!");
            refreshData();
        } catch (e) { alert("Error!"); btn.disabled = false; }
    }

    async function loadAdminRequests() {
        const { data: reqs } = await db.from('withdrawals').select('*').eq('status', 'pending');
        let h = "";
        reqs?.forEach(r => {
            h += `<div style="background:#1e293b; padding:10px; border-radius:10px; margin-top:5px; border-left:4px solid var(--success);">
                User: ${r.wallet_address.substring(0,8)}... <button onclick="approveWithdrawal(${r.id}, '${r.wallet_address}')" style="width:auto; padding:5px; font-size:10px;">PAID</button>
            </div>`;
        });
        document.getElementById("reqList").innerHTML = h || "No requests.";
    }

    async function approveWithdrawal(id, address) {
        if(!confirm("Deduct 500?")) return;
        const { data: user } = await db.from('user_balances').select('pending_balance').eq('wallet_address', address).single();
        await db.from('user_balances').update({ pending_balance: user.pending_balance - 500 }).eq('wallet_address', address);
        await db.from('withdrawals').update({ status: 'completed' }).eq('id', id);
        alert("DONE!");
        loadAdminRequests();
        refreshData();
    }

    async function uploadCodes() {
        const input = document.getElementById("newCodesInput").value;
        const codes = input.split(',').map(c => ({ code: c.trim().toUpperCase(), is_used: false })).filter(c => c.code !== "");
        await db.from('valid_codes').insert(codes);
        alert("Uploaded!");
        document.getElementById("newCodesInput").value = "";
    }
</script>
</body>
</html>
