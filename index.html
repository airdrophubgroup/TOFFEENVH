<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOFFEENVH - Official Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --success: #10b981; --error: #ef4444; --accent: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 480px; margin: 20px auto; background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid #334155; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        h1 { color: var(--primary); font-size: 28px; margin-bottom: 5px; }
        .balance-card { background: #0f172a; padding: 20px; border-radius: 18px; margin: 20px 0; border: 1px solid var(--primary); }
        .progress-container { background: #334155; border-radius: 10px; height: 18px; width: 100%; margin: 15px 0; overflow: hidden; }
        .progress-bar { background: var(--primary); width: 0%; height: 100%; transition: 0.8s ease; }
        input { width: 90%; padding: 14px; margin: 10px 0; border-radius: 12px; background: #0f172a; color: white; border: 2px solid #334155; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        button { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-wallet { background: var(--accent); color: #0f172a; }
        .btn-claim { background: var(--primary); color: #0f172a; }
        .btn-withdraw { background: var(--success); color: white; display: none; }
        #status { margin-top: 15px; font-size: 14px; padding: 12px; border-radius: 10px; display: none; background: #334155; }
        #adminPanel { display: none; margin-top: 30px; padding: 20px; background: #111827; border: 2px dashed #f43f5e; border-radius: 20px; text-align: left; }
        .req-card { background: #1f2937; padding: 10px; margin: 8px 0; border-radius: 10px; font-size: 12px; border-left: 4px solid var(--primary); }
        
        /* Wheel Styling */
        #wheel { width: 150px; height: 150px; border: 5px solid var(--accent); border-radius: 50%; margin: 15px auto; position: relative; transition: transform 3.5s cubic-bezier(0.17, 0.67, 0.1, 0.99); background: conic-gradient(#38bdf8 0deg 72deg, #1e293b 72deg 144deg, #10b981 144deg 216deg, #f59e0b 216deg 288deg, #ef4444 288deg 360deg); }
        .wheel-needle { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 25px solid white; z-index: 10; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍬 TOFFEENVH</h1>
    <p style="color: #94a3b8; font-size: 14px;">Official Nihal Vihar Digital Rewards</p>

    <button id="walletBtn" class="btn-wallet" onclick="connectWallet()">1. Connect MetaMask</button>

    <div id="userUI">
        <div class="balance-card">
            <div style="display: flex; justify-content: space-between;">
                <span>Balance Earned</span>
                <span id="balText" style="font-weight: bold; color: var(--primary);">0 / 500 TOFFEE</span>
            </div>
            <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>
            <small id="pctText">0% to Withdrawal</small>
        </div>

        <input type="text" id="codeInput" placeholder="Enter Wrapper Code">
        <button class="btn-claim" onclick="processClaim()">2. Add 10 Tokens</button>

        <div class="balance-card" style="border-color: var(--accent);">
            <h3 style="margin: 0; color: var(--accent);">🎡 Daily Lucky Spin</h3>
            <div id="wheel"><div class="wheel-needle"></div></div>
            <button id="spinBtn" class="btn-wallet" style="margin-top: 10px; height: 45px; padding: 5px;" onclick="handleSpin()">🎰 SPIN NOW</button>
            <p id="spinTimer" style="font-size: 13px; color: var(--error); display: none; margin-top: 10px;"></p>
        </div>

        <button id="withdrawBtn" class="btn-withdraw" onclick="submitWithdrawRequest()">🚀 REQUEST 500 TOFFEE WITHDRAWAL</button>
    </div>

    <div id="status"></div>

    <div id="adminPanel">
        <h3 style="color: #f43f5e; margin-top: 0;">👨‍💻 Admin Control</h3>
        <div id="reqList">Loading Data...</div>
    </div>
</div>

<script>
    const SB_URL = 'https://xshsfgyfbbnommuhvwat.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzaHNmZ3lmYmJub21tdWh2d2F0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTA4OTYsImV4cCI6MjA4OTU2Njg5Nn0.bv_tP_jH74wzDz99tFBYlcaaZRPqmIkXnYvI_aUbKpo';
    const db = supabase.createClient(SB_URL, SB_KEY);
    
    const V1_ADDRESS = "0xF5Fc412E1ae71924fd7C6bD44A3cDADa8e69fd37";
    const ADMIN_WALLET = "0x8fb70cdfb545c7d9b842cbe37b9aba84059bf14b";
    let userWallet = "";

    async function connectWallet() {
        if (window.ethereum) {
            const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userWallet = accs[0].toLowerCase();
            document.getElementById("walletBtn").innerText = "Wallet: " + userWallet.substring(0,10) + "...";
            if (userWallet === ADMIN_WALLET) {
                document.getElementById("adminPanel").style.display = "block";
                loadAdminPanel();
            }
            loadBalance();
        } else { alert("Install MetaMask!"); }
    }

    async function loadBalance() {
        if(!userWallet) return;
        const { data } = await db.from('user_balances').select('*').eq('wallet_address', userWallet).maybeSingle();
        if (data) updateUI(data.pending_balance);
    }

    function updateUI(bal) {
        document.getElementById("balText").innerText = bal + " / 500 TOFFEE";
        let pct = (bal / 500) * 100;
        document.getElementById("progressBar").style.width = Math.min(pct, 100) + "%";
        document.getElementById("pctText").innerText = Math.floor(pct) + "% Completed";
        if (bal >= 500) document.getElementById("withdrawBtn").style.display = "block";
    }

    async function processClaim() {
        const input = document.getElementById("codeInput");
        const code = input.value.trim();
        if (!userWallet || !code) return alert("Fill details!");

        showStatus("Checking Code Validity...", "info");

        try {
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const contract = new ethers.Contract(V1_ADDRESS, ["function validCodes(string) view returns (bool)"], provider);
            const isValid = await contract.validCodes(code);
            
            if (!isValid) return alert("❌ Invalid or Used Wrapper Code!");

            const { data: used } = await db.from('used_codes').select('*').eq('code', code).maybeSingle();
            if (used) return alert("❌ Code already claimed on website!");

            // Update Balance logic
            const { data: cur } = await db.from('user_balances').select('pending_balance').eq('wallet_address', userWallet).maybeSingle();
            let newBal = (cur ? cur.pending_balance : 0) + 10;
            
            const { error } = await db.from('user_balances').upsert({ 
                wallet_address: userWallet, 
                pending_balance: newBal,
                is_withdrawn: false 
            }, { onConflict: 'wallet_address' });

            if (error) throw error;

            await db.from('used_codes').insert([{ code: code, user_wallet: userWallet }]);
            alert("✅ 10 TOFFEE Added!");
            input.value = "";
            loadBalance();
        } catch (e) { alert("Error: " + e.message); }
    }

    async function handleSpin() {
        if (!userWallet) return alert("Connect Wallet!");
        const btn = document.getElementById("spinBtn");
        const timer = document.getElementById("spinTimer");
        const wheel = document.getElementById("wheel");

        const { data } = await db.from('daily_spins').select('last_spin_at').eq('wallet_address', userWallet).maybeSingle();
        if (data) {
            const hours = (new Date() - new Date(data.last_spin_at)) / (1000 * 60 * 60);
            if (hours < 24) {
                timer.innerText = `⏳ Next spin in ${Math.ceil(24 - hours)} hours`;
                timer.style.display = "block";
                return;
            }
        }

        btn.disabled = true;
        timer.style.display = "none";
        const deg = Math.floor(Math.random() * 360) + 1800; 
        wheel.style.transform = `rotate(${deg}deg)`;

        setTimeout(async () => {
            const win = [5, 10, 20, 30, 50][Math.floor(Math.random() * 5)];
            const { data: b } = await db.from('user_balances').select('pending_balance').eq('wallet_address', userWallet).maybeSingle();
            
            await db.from('user_balances').upsert({ 
                wallet_address: userWallet, 
                pending_balance: (b ? b.pending_balance : 0) + win,
                is_withdrawn: false 
            }, { onConflict: 'wallet_address' });

            await db.from('daily_spins').upsert({ wallet_address: userWallet, last_spin_at: new Date().toISOString() });

            alert(`🎉 Won ${win} TOFFEE!`);
            loadBalance();
            btn.disabled = false;
        }, 3500);
    }

    async function loadAdminPanel() {
        const { data: reqs } = await db.from('withdrawals').select('*').eq('status', 'pending');
        const { data: users } = await db.from('user_balances').select('*').order('pending_balance', {ascending: false}).limit(5);
        
        let h = "<h4>Withdrawal Requests</h4>";
        if (reqs && reqs.length > 0) {
            reqs.forEach(r => h += `<div class="req-card"><b>User:</b> ${r.wallet_address.slice(0,10)}... <br><b>Amt:</b> ${r.amount} <button onclick="approveAdmin('${r.wallet_address}', ${r.id})" style="padding:2px 5px; background:var(--success); width:auto; font-size:10px;">MARK PAID</button></div>`);
        } else { h += "<p style='font-size:10px;'>No pending requests.</p>"; }

        h += "<h4>Top Balances</h4>";
        users.forEach(u => h += `<div style='font-size:11px; margin-bottom:4px;'>${u.wallet_address.slice(0,15)}... : <b>${u.pending_balance}</b></div>`);
        
        document.getElementById("reqList").innerHTML = h;
    }

    async function approveAdmin(addr, id) {
        await db.from('withdrawals').update({ status: 'completed' }).eq('id', id);
        const { data } = await db.from('user_balances').select('pending_balance').eq('wallet_address', addr).single();
        await db.from('user_balances').update({ pending_balance: data.pending_balance - 500 }).eq('wallet_address', addr);
        alert("Paid & Reset!");
        loadAdminPanel();
    }

    function showStatus(m, t) {
        const s = document.getElementById("status");
        s.innerText = m; s.style.display = "block";
    }
</script>
</body>
</html>
